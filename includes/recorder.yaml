# Настройки хранения инфы в БД
db_url: !secret db_link # Формат: mysql://user:pass@IP/db_name?charset=utf8mb4
db_max_retries: 20 # Увеличено для MariaDB
db_retry_wait: 5 # Увеличено для MariaDB
auto_purge: false
purge_keep_days: 90
auto_repack: false # Для MariaDB лучше управлять вручную
commit_interval: 30 # Снижает нагрузку на диск

# --- Сначала определяем, что мы хотим хранить в целом ---
include:
  # Включаем целые домены сущностей
  domains:
    - light
    - switch
    - binary_sensor
    - input_boolean
    - select
    - climate
    - timer
    - weather
    - media_player
    - automation
    - event
    - humidifier # увлажнитель
    - fan # очиститель воздуха

  # Включаем группы сущностей по маске имени
  # ВАЖНО:
  # Здесь можно использовать маски со звёздочкой.
  # В include.entities ниже — только точные entity_id.
  entity_globs:
    - sensor.*temperature*
    - sensor.*humidity*
    - sensor.*_battery*
    - sensor.*_pressure
    - sensor.*_co2*
    - sensor.*_pm25*
    - sensor.*_pm2_5*
    - binary_sensor.*_contact
    - binary_sensor.*_occupancy
    - sensor.cpu_*_normalized
    - sensor.cpu_*_host_percent
    - sensor.*_energy
    - sensor.*_power
    - sensor.*_illuminance

    # Цветы
    - sensor.ficus_*
    - sensor.euphorbia_*
    - plant.*

    # Виртуализация
    - sensor.lxc_*
    - sensor.qemu_*
    - sensor.*_pve_*

    # Скорость интернета
    - sensor.speedtest_*
    - sensor.cloudflare_*

    # Фильтры климатической техники
    - sensor.*_filter_*

    # Контроль уровня воды
    - event.*_low_water_*

    # Сейф
    - sensor.strongbox_*

    # Mikrotik
    - sensor.mikrotik_*

    # Телефоны и присутствие по устройствам
    - sensor.pixel_*
    - sensor.iphone_*
    - device_tracker.*

    # Часы
    - sensor.google_*

    # Экспериментальные
    - sensor.vremia_igry_*
    - sensor.*_ps5_*
    - sensor.dzengi_guard_*
    - sensor.yandex_pogoda_*

  # Включаем отдельные сущности, которые не попали в правила выше
  # ВАЖНО:
  # Здесь только точные entity_id, без звёздочек.
  entities:
    # Системные и специфические сенсоры
    - sensor.maria_db_size
    - sensor.cpu_lxc_npmplus

    # Климатические кастомные
    - sensor.vlazhnost_vannoi_usrednennaia_za_1_minutu
    - sensor.uroven_co2_sglazhennyi
    - sensor.bathroom_filtered_humidity
    - sensor.temperatura_v_gostinoi_sglazhennaia
    - sensor.temperatura_v_spalne_sglazhennaia
    - sensor.srednee_znachenie_temperatury_v_masterskoi_2
    - sensor.gostinaia_stantsiia_mini_3_pro_vlazhnost
    - sensor.gostinaia_stantsiia_mini_3_pro_temperatura
    - sensor.gostinaia_stantsiia_mini_3_pro_uroven_uglekislogo_gaza

    # Электроэнергия
    - sensor.potreblenie_stiralnoi_mashiny

    # Освещенность
    - sensor.livingroom_light_sensor_illuminance

    # Кто был дома / присутствие жильцов
    - input_text.currently_home
    - input_text.weather_primary_entity
    - input_text.weather_fallback_entity
    - person.master
    - person.hanna

    # Телефоны: точные сущности для отладки присутствия
    - device_tracker.iphone_mary
    - sensor.iphone_mary_ssid
    - sensor.iphone_mary_bssid
    #    - sensor.iphone_mary_connection_type
    - sensor.iphone_mary_battery_level
    - sensor.iphone_mary_battery_state
    - sensor.iphone_mary_location_permission
    - sensor.pixel_8_pro_wi_fi_connection

    # Шаблонные сенсоры присутствия
    - binary_sensor.andrei_wifi_home
    - binary_sensor.hanna_wifi_home
    - binary_sensor.andrei_is_home
    - binary_sensor.hanna_is_home
    - binary_sensor.resident_is_home
    - binary_sensor.someone_is_home

    # Тестовая секция
    - sensor.app_usage_last_month

    # Увлажнитель, гостиная
    - input_number.livingroom_hum_low
    - input_number.livingroom_hum_high
    - input_number.livingroom_hum_min_on_min
    - input_number.livingroom_hum_min_off_min

    # Очиститель, гостиная
    - input_number.livingroom_pm25_high
    - input_number.livingroom_pm25_low
    - input_number.livingroom_air_min_on_min
    - input_number.livingroom_air_min_off_min

    # Тестирование
    - sensor.vremia_raboty_televizora_segodnia

# --- Теперь определяем, что мы ТОЧНО НЕ хотим хранить ---
exclude:
  # Исключаем шумные домены
  domains:
    - update
    - camera
    - button
    - script
    - vacuum

  # Исключаем шумные группы сущностей
  entity_globs:
    - sensor.*_linkquality # Очень частые апдейты
    - sensor.*_power_* # Часто шумные
    - binary_sensor.*_battery_low # Дублирует информацию про батарею

  # Исключаем отдельные шумные сущности
  entities:
    - binary_sensor.backups_stale # Если он не важен для истории

  # Системные типы событий, для истории не нужны
  event_types:
    - call_service
    - automation_triggered
    - logbook_entry
    - service_registered
# Ссылка на сервер MariaDB в секретах по шаблону:
# db_link: mysql://user:pass@IP/homeassistant?charset=utf8mb4&ssl=true
