# Базовые настройки. Не удалять!
default_config:

# Подгружаем темы
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /hacsfiles/ha-yandex-icons/yandex-icons.js
    - /hacsfiles/hass-hue-icons/hass-hue-icons.js

homeassistant:
  name: Квартира 133
  latitude: !secret latitude_coord
  longitude: !secret longitude_coord
  elevation: !secret elevation
  unit_system: metric
  country: !secret country
  time_zone: !secret time_zone
  # Используем пакеты для определенных групп
  packages: !include_dir_named packages

############################################################
#                       ЗОНЫ
############################################################
zone:
  - name: Home
    latitude: !secret latitude_coord
    longitude: !secret longitude_coord
    radius: 100
    icon: mdi:home

############################################################
#                   РАЗНЕСЁННЫЕ НАСТРОЙКИ
############################################################
recorder: !include includes/recorder.yaml

# Уровень логирования - только ошибки
logger:
  default: error
  logs:
    homeassistant.components.automation: error
    homeassistant.components.telegram_bot: error
    homeassistant.components.notify: error
    homeassistant.components.sql: warning

############################################################
#                       HTTP
############################################################
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - !secret npmplus_link
