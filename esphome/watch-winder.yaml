esphome:
  name: watch-winder
  friendly_name: Заводчик часов

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Два ШИМ-выхода, управляющие входами H-моста.
output:
  - platform: ledc
    id: motor_input_a
    pin: GPIO4
    frequency: 1220Hz

  - platform: ledc
    id: motor_input_b
    pin: GPIO5
    frequency: 1220Hz

fan:
  - platform: hbridge
    id: watch_winder_motor
    name: "Мотор заводчика"
    pin_a: motor_input_a
    pin_b: motor_input_b

    # Только один уровень: полная скорость.
    speed_count: 1

    # При загрузке мотор всегда выключен.
    restore_mode: ALWAYS_OFF

    # Режим переключения H-моста.
    decay_mode: slow

number:
  - platform: template
    id: rotation_time
    name: "Длительность вращения"
    unit_of_measurement: "с"
    entity_category: config
    mode: box

    min_value: 1
    max_value: 300
    step: 1

    optimistic: true
    restore_value: true
    initial_value: 10

script:
  - id: run_rotation_cycle
    mode: restart
    then:
      - fan.turn_on:
          id: watch_winder_motor
          speed: 1

      - delay: !lambda |-
          return static_cast<uint32_t>(
            id(rotation_time).state * 1000.0f
          );

      - fan.turn_off: watch_winder_motor

button:
  - platform: template
    name: "Запустить цикл"
    icon: mdi:play
    on_press:
      - script.execute: run_rotation_cycle

  - platform: template
    name: "Остановить"
    icon: mdi:stop
    on_press:
      - script.stop: run_rotation_cycle
      - fan.turn_off: watch_winder_motor