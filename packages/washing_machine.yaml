################################################################################
# /packages/washing_machine.yaml
################################################################################
#
# КОНТРОЛЬ РАБОТЫ СТИРАЛЬНОЙ МАШИНЫ И НАПОМИНАНИЙ
#
# ФУНКЦИИ:
# 1. Определение старта и окончания цикла стирки
#    • Гистерезис через template binary sensors
#    • Защита от коротких колебаний мощности
#    • Защита от раннего окончания на паузах программы
#    • Проверка минимальной длительности цикла
#
# 2. Уведомления
#    • Сообщение в Telegram при завершении стирки
#    • Голосовое уведомление через Яндекс-колонку
#    • Отложенное напоминание, если ванной не пользуются 15 минут
#
# 3. Устойчивость к рестартам и сбоям питания
#    • Сохранение/восстановление состояния цикла при рестарте HA
#    • Детекция потери питания розетки стиральной машины
#    • Уведомление о восстановлении питания
#
# ЗАВИСИМОСТИ:
# • sensor.bathroom_washing_machine_socket_power
# • switch.bathroom_washing_machine_socket
# • binary_sensor.bathroom_open_door
# • binary_sensor.bathroom_motions
# • input_boolean.system_startup_phase
# • input_boolean.silent_mode
# • binary_sensor.someone_is_home
# • input_boolean.wm_cycle_seen_start
# • input_boolean.washing_machine_running
# • input_boolean.washing_machine_pre_restart_state
# • input_boolean.wm_socket_outage_active
# • notify.telegram_master
# • script.yandex_tts_washing_machine_finished
# • script.yandex_tts_washing_machine_reminder
# • script.yandex_tts_washing_machine_power_lost
# • script.yandex_tts_washing_machine_power_restored
#
################################################################################

##############################################################################
# НАСТРАИВАЕМЫЕ ПАРАМЕТРЫ
##############################################################################

input_number:
  wm_start_power_w:
    name: "Стиралка: мощность старта цикла (Вт)"
    min: 3
    max: 50
    step: 1
    initial: 8
    unit_of_measurement: "Вт"
    icon: mdi:flash-triangle

  wm_finish_power_w:
    name: "Стиралка: мощность завершения цикла (Вт)"
    min: 0
    max: 10
    step: 0.5
    initial: 2
    unit_of_measurement: "Вт"
    icon: mdi:flash-off

  wm_min_cycle_min:
    name: "Стиралка: минимальная длительность цикла (мин)"
    min: 15
    max: 180
    step: 5
    initial: 30
    icon: mdi:timer-check-outline

input_datetime:
  washing_machine_started_at:
    name: "Стиралка: время старта цикла"
    has_date: true
    has_time: true

input_boolean:
  washing_machine_finished_pending:
    name: "Стиралка: ожидается напоминание"
    icon: mdi:bell-ring-outline

##############################################################################
# БИНАРНЫЕ СЕНСОРЫ
##############################################################################

template:
  - binary_sensor:
      # ======================================================================
      # Стиральная машина активна
      # ======================================================================
      # ON:
      # • мощность розетки > настраиваемого порога старта (по умолчанию 8 Вт)
      #
      # OFF:
      # • мощность <= порога старта
      # • либо мощность недоступна/unknown/unavailable
      #
      # ВАЖНО:
      # • availability намеренно не используется.
      #   Если мощность временно недоступна, этот сенсор должен быть off,
      #   а не unavailable, чтобы автоматизации не зависали.
      #
      # Задержки:
      # • delay_on 1 минута — старт подтверждается устойчивой нагрузкой
      # • delay_off 20 минут — длинные паузы внутри программы не завершают цикл
      # ======================================================================
      - unique_id: stiralnaia_mashina_aktivna
        name: "Стиральная машина активна"
        delay_on:
          minutes: 1
        delay_off:
          minutes: 20
        state: >
          {% set p = states('sensor.bathroom_washing_machine_socket_power') %}
          {% set start_power = states('input_number.wm_start_power_w') | float(8) %}
          {{ p not in ['unknown', 'unavailable', 'none', '']
             and (p | float(0)) > start_power }}
        icon: mdi:washing-machine

      # ======================================================================
      # Стиральная машина завершила стирку
      # ======================================================================
      # ON:
      # • мощность <= настраиваемого порога завершения (по умолчанию 2 Вт)
      # • цикл уже был замечен после старта
      # • флаг "стиралка работает" включён
      # • это состояние держится непрерывно 20 минут
      #
      # НАЗНАЧЕНИЕ:
      # • порог завершения намеренно ниже порога старта
      # • 20 минут непрерывного простоя отсекают паузы нагрева/замачивания
      # • этот сенсор используется только как устойчивый признак завершения
      # • уведомление срабатывает по переходу этого сенсора в on
      #
      # ВАЖНО:
      # • availability намеренно не используется
      # • если мощность недоступна, сенсор будет off, а не unavailable
      # ======================================================================
      - unique_id: stiralnaia_mashina_zavershila_stirku
        name: "Стиральная машина завершила стирку"
        delay_on:
          minutes: 20
        state: >
          {% set p = states('sensor.bathroom_washing_machine_socket_power') %}
          {% set finish_power = states('input_number.wm_finish_power_w') | float(2) %}
          {{ p not in ['unknown', 'unavailable', 'none', '']
             and (p | float(0)) <= finish_power
             and is_state('input_boolean.washing_machine_running', 'on')
             and is_state('input_boolean.wm_cycle_seen_start', 'on') }}
        icon: mdi:washing-machine-off

      # ======================================================================
      # Отсутствие активности в ванной 15 минут
      # ======================================================================
      # ON:
      # • дверь ванной закрыта
      # • движения в ванной нет
      # • состояние держится 15 минут
      #
      # ВАЖНО:
      # • availability намеренно не используется
      # • если датчики двери/движения недоступны, сенсор будет off
      # ======================================================================
      - unique_id: no_activity_in_bathroom_recently
        name: no_activity_in_bathroom_recently
        device_class: problem
        delay_on:
          minutes: 15
        state: >-
          {{ is_state('binary_sensor.bathroom_open_door', 'off')
             and is_state('binary_sensor.bathroom_motions', 'off') }}
        icon: >-
          {% if is_state('binary_sensor.no_activity_in_bathroom_recently', 'on') %}
            mdi:clock-alert
          {% else %}
            mdi:clock-check
          {% endif %}

##############################################################################
# АВТОМАТИЗАЦИИ
##############################################################################

automation:
  # ----------------------------------------------------------------------------
  # 1. СОХРАНЕНИЕ/ВОССТАНОВЛЕНИЕ ПРИ РЕСТАРТЕ
  # ----------------------------------------------------------------------------
  - id: "064cbd85-8d52-40ac-98bd-98164ad1434c"
    alias: "HELPER: Сохранение/восстановление состояния стиральной машины"
    mode: single
    description: >
      Сохраняет факт активной стирки перед shutdown и восстанавливает
      состояние флагов после старта HA.
    triggers:
      - trigger: homeassistant
        event: shutdown
        id: shutdown

      - trigger: homeassistant
        event: start
        id: start

    actions:
      - choose:
          # --------------------------------------------------------------------
          # Перед выключением HA
          # --------------------------------------------------------------------
          - conditions:
              - condition: trigger
                id: shutdown
            sequence:
              - choose:
                  - conditions:
                      - condition: or
                        conditions:
                          - condition: state
                            entity_id: binary_sensor.stiralnaia_mashina_aktivna
                            state: "on"
                          - condition: state
                            entity_id: input_boolean.washing_machine_running
                            state: "on"
                    sequence:
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.washing_machine_pre_restart_state
                default:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.washing_machine_pre_restart_state

          # --------------------------------------------------------------------
          # После старта HA
          # --------------------------------------------------------------------
          - conditions:
              - condition: trigger
                id: start
            sequence:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.washing_machine_pre_restart_state
                        state: "on"
                    sequence:
                      - action: input_boolean.turn_on
                        target:
                          entity_id:
                            - input_boolean.washing_machine_running
                            - input_boolean.wm_cycle_seen_start

                      - action: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.washing_machine_finished_pending

                default:
                  - action: input_boolean.turn_off
                    target:
                      entity_id:
                        - input_boolean.washing_machine_running
                        - input_boolean.wm_cycle_seen_start
                        - input_boolean.washing_machine_finished_pending

              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.washing_machine_pre_restart_state

  # ----------------------------------------------------------------------------
  # 2. ОСНОВНАЯ ЛОГИКА: СТАРТ + ОКОНЧАНИЕ + УВЕДОМЛЕНИЕ
  # ----------------------------------------------------------------------------
  - id: "04a14878-99d3-4030-a17d-bfa3c75b1f9b"
    alias: "Стиральная машина: Управление циклом"
    mode: restart
    description: >
      Обрабатывает старт и завершение цикла стирки.

      Старт:
      • binary_sensor.stiralnaia_mashina_aktivna переходит в on.

      Окончание:
      • binary_sensor.stiralnaia_mashina_zavershila_stirku переходит в on.
      • этот сенсор содержит задержку 20 минут при мощности <= порога завершения.
      • минимальная длительность цикла по умолчанию составляет 30 минут.

      После успешного завершения:
      • отправляет основное уведомление
      • поднимает флаг washing_machine_finished_pending
      • сбрасывает флаги running / seen_start.
    triggers:
      - trigger: state
        entity_id: binary_sensor.stiralnaia_mashina_aktivna
        to: "on"
        id: start

      - trigger: state
        entity_id: binary_sensor.stiralnaia_mashina_zavershila_stirku
        to: "on"
        id: finish

      # Сверка нужна после рестарта HA и на случай пропущенного state-события.
      - trigger: state
        entity_id: input_boolean.system_startup_phase
        to: "off"
        id: watchdog

      - trigger: time_pattern
        minutes: "/5"
        id: watchdog

    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"

    actions:
      - choose:
          # --------------------------------------------------------------------
          # Старт цикла
          # --------------------------------------------------------------------
          - conditions:
              - condition: or
                conditions:
                  - condition: trigger
                    id: start
                  - condition: and
                    conditions:
                      - condition: trigger
                        id: watchdog
                      - condition: state
                        entity_id: binary_sensor.stiralnaia_mashina_aktivna
                        state: "on"
                      - condition: state
                        entity_id: input_boolean.washing_machine_running
                        state: "off"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id:
                    - input_boolean.washing_machine_running
                    - input_boolean.wm_cycle_seen_start

              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.washing_machine_finished_pending

              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.washing_machine_started_at
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

          # --------------------------------------------------------------------
          # Окончание цикла
          # --------------------------------------------------------------------
          - conditions:
              - condition: or
                conditions:
                  - condition: trigger
                    id: finish
                  - condition: and
                    conditions:
                      - condition: trigger
                        id: watchdog
                      - condition: state
                        entity_id: binary_sensor.stiralnaia_mashina_zavershila_stirku
                        state: "on"

              - condition: state
                entity_id: input_boolean.washing_machine_running
                state: "on"

              - condition: state
                entity_id: input_boolean.wm_cycle_seen_start
                state: "on"
            sequence:
              - variables:
                  started_ts: "{{ as_timestamp(states('input_datetime.washing_machine_started_at'), 0) }}"
                  min_sec: "{{ (states('input_number.wm_min_cycle_min') | float(30) * 60) | int }}"
                  cycle_sec: "{{ (as_timestamp(now()) - started_ts | float(0)) | int }}"
                  cycle_is_valid: "{{ started_ts | float(0) > 0 and cycle_sec | int >= min_sec | int }}"

              - choose:
                  # --------------------------------------------------------------
                  # Корректное завершение реального цикла
                  # --------------------------------------------------------------
                  - conditions:
                      - condition: template
                        value_template: "{{ cycle_is_valid }}"
                    sequence:
                      - choose:
                          - conditions:
                              - condition: state
                                entity_id: input_boolean.silent_mode
                                state: "off"

                              - condition: state
                                entity_id: binary_sensor.someone_is_home
                                state: "on"
                            sequence:
                              - action: script.yandex_tts_washing_machine_finished

                              - action: notify.send_message
                                target:
                                  entity_id: notify.telegram_master
                                data:
                                  message: "🏠 Стирка закончена! 🧼"

                        default:
                          - action: notify.send_message
                            target:
                              entity_id: notify.telegram_master
                            data:
                              message: "🏠 Стирка закончена! 🧼"

                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.washing_machine_finished_pending

                      # Цикл закрываем только после подтвержденного завершения.
                      - action: input_boolean.turn_off
                        target:
                          entity_id:
                            - input_boolean.washing_machine_running
                            - input_boolean.wm_cycle_seen_start

                # --------------------------------------------------------------
                # Ранний кандидат завершения: продолжаем отслеживать цикл
                # --------------------------------------------------------------
                default:
                  - action: script.log_helper_event
                    data:
                      level: warning
                      message: "Стиралка: ранний кандидат завершения проигнорирован, цикл остается активным."
                      source: "{{ this.entity_id }}"
                      trigger_entity: binary_sensor.stiralnaia_mashina_zavershila_stirku
                      trigger_from: "off"
                      trigger_to: "on"
                      extra: >-
                        duration={{ (cycle_sec | int / 60) | round(1) }} min;
                        minimum={{ states('input_number.wm_min_cycle_min') }} min;
                        power={{ states('sensor.bathroom_washing_machine_socket_power') }} W

  # ----------------------------------------------------------------------------
  # 3. НАПОМИНАНИЕ, ЕСЛИ ВАННОЙ НЕ ПОЛЬЗУЮТСЯ 15 МИНУТ
  # ----------------------------------------------------------------------------
  - id: "washing_machine_reminder_no_motion"
    alias: "Уведомление: Напоминание о стирке при отсутствии активности в ванной"
    mode: single
    description: >
      Отправляет голосовое напоминание о завершённой стирке, если ванной
      не пользуются уже 15 минут.
    triggers:
      - trigger: state
        entity_id: binary_sensor.no_activity_in_bathroom_recently
        to: "on"

    conditions:
      - condition: state
        entity_id: input_boolean.washing_machine_finished_pending
        state: "on"

      - condition: state
        entity_id: input_boolean.washing_machine_running
        state: "off"

      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"

      - condition: state
        entity_id: input_boolean.silent_mode
        state: "off"

      - condition: state
        entity_id: binary_sensor.someone_is_home
        state: "on"

    actions:
      - action: script.yandex_tts_washing_machine_reminder

      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.washing_machine_finished_pending

  # ----------------------------------------------------------------------------
  # 4. АВАРИЯ ПИТАНИЯ РОЗЕТКИ СТИРАЛЬНОЙ МАШИНЫ
  # ----------------------------------------------------------------------------
  - id: "91f99b09-a228-43af-9377-11069bff484b"
    alias: "Уведомление: Стиралка — розетка недоступна"
    mode: single
    description: >
      Сообщает о потере питания розетки, если это произошло во время активной
      стирки.
    triggers:
      - trigger: state
        entity_id: switch.bathroom_washing_machine_socket
        to: "unavailable"
        for: "00:00:30"
        id: unavailable

      - trigger: state
        entity_id: switch.bathroom_washing_machine_socket
        to: "unknown"
        for: "00:00:30"
        id: unknown

    conditions:
      - condition: state
        entity_id: input_boolean.washing_machine_running
        state: "on"

      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"

      - condition: state
        entity_id: input_boolean.wm_socket_outage_active
        state: "off"

    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.wm_socket_outage_active

      - variables:
          started_at: "{{ states('input_datetime.washing_machine_started_at') }}"
          last_power: "{{ states('sensor.bathroom_washing_machine_socket_power') }}"

      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >-
            ⚠️ <b>Стиральная машина: питание недоступно</b>
            Розетка unavailable/unknown.
            Стирка начата: {{ started_at }}.
            Последняя P={{ last_power }} Вт.

      - action: script.yandex_tts_washing_machine_power_lost

  # ----------------------------------------------------------------------------
  # 5. ВОССТАНОВЛЕНИЕ ПИТАНИЯ
  # ----------------------------------------------------------------------------
  - id: "eb7b1bfa-4c3d-4a78-ac5b-eaa20756842c"
    alias: "Уведомление: Стиралка — питание восстановлено"
    mode: single
    description: >
      Сообщает, что питание розетки стиральной машины восстановилось.
    triggers:
      - trigger: state
        entity_id: switch.bathroom_washing_machine_socket
        from: "unavailable"
        for: "00:00:45"

      - trigger: state
        entity_id: switch.bathroom_washing_machine_socket
        from: "unknown"
        for: "00:00:45"

    conditions:
      - condition: state
        entity_id: input_boolean.wm_socket_outage_active
        state: "on"

      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"

    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.wm_socket_outage_active

      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "✅ Стиральная машина: питание восстановлено."

      - action: script.yandex_tts_washing_machine_power_restored

  # ----------------------------------------------------------------------------
  # 6. СБРОС ФЛАГА АВАРИИ ПРИ СТАРТЕ HA
  # ----------------------------------------------------------------------------
  - id: "bc7cc8c2-b6c3-4843-851b-e69d25a9bc78"
    alias: "HELPER: Сброс флага аварии стиралки при старте HA"
    mode: single
    description: >
      Сбрасывает флаг аварии питания при запуске Home Assistant.
    triggers:
      - trigger: homeassistant
        event: start

    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.wm_socket_outage_active

