################################################################################
# /packages/washing_machine.yaml
################################################################################
#
# Пакет конфигураций Home Assistant для контроля работы стиральной машины
# и уведомлений.
#
# Изменения/уточнения:
#  - Убраны упоминания про input_boolean.stiralnaia_mashina_zavershila_stirku (остаётся только
#    binary_sensor.stiralnaia_mashina_zavershila_stirku).
#  - Уведомление о завершении теперь отправляется в Telegram + TTS на Яндекс-колонку.
#  - Сброшен сервис notify.notify.
#
# Доработки на основе отзыва:
#  - Добавлен гистерезис в binary_sensor (delay_off для active, синхронизация delay_on).
#  - Объединены автоматизации для старта/окончания и сбросов при рестарте.
#  - Упрощены условия в уведомлениях (добавлен silent_mode в Telegram, проверки на someone_is_home).
#  - Добавлено логирование для ключевых событий.
#  - Минимальное время стирки уменьшено до 10 мин в шаблоне (настраиваемо).
#
################################################################################

input_number:
  wm_min_cycle_min:
    name: "Стиралка: минимальная длительность цикла (мин)"
    min: 5
    max: 180
    step: 5
    initial: 10

input_datetime:
  washing_machine_started_at:
    name: "Стиралка: время старта цикла"
    has_date: true
    has_time: true

##############################################################################
#                          БИНАРНЫЕ СЕНСОРЫ
##############################################################################

template:
  - binary_sensor:
      # ----------------------------------------------------------------------
      # Стиральная машина активна
      # ----------------------------------------------------------------------
      # Мощность > 5 Вт означает, что машина работает.
      # delay_off не поддерживается в новом формате — логику задержки
      # можно реализовать через for: в триггерах автоматизаций.
      # ----------------------------------------------------------------------
      - unique_id: stiralnaia_mashina_aktivna
        name: "Стиральная машина активна"
        availability: >
          {{ states('sensor.bathroom_washing_machine_power') not in ['unknown', 'unavailable', ''] }}
        state: >
          {{ (states('sensor.bathroom_washing_machine_power') | float(0)) > 5 }}
        icon: mdi:washing-machine

      # ----------------------------------------------------------------------
      # Стиральная машина завершила стирку
      # ----------------------------------------------------------------------
      # Мощность < 5 Вт означает завершение цикла.
      # delay_on не поддерживается в новом формате — задержка 2 минуты
      # реализована через for: в триггере автоматизации уведомления.
      # ----------------------------------------------------------------------
      - unique_id: stiralnaia_mashina_zavershila_stirku
        name: "Стиральная машина завершила стирку"
        availability: >
          {{ states('sensor.bathroom_washing_machine_power') not in ['unknown', 'unavailable', ''] }}
        state: >
          {{ (states('sensor.bathroom_washing_machine_power') | float(0)) < 5 }}
        icon: mdi:washing-machine-off

automation:
  # ----------------------------------------------------------------------------
  # 1. СОХРАНЕНИЕ/ВОССТАНОВЛЕНИЕ ПРИ РЕСТАРТЕ (Без изменений)
  # ----------------------------------------------------------------------------
  - id: "064cbd85-8d52-40ac-98bd-98164ad1434c"
    alias: "HELPER: Сохранение/восстановление состояния стиральной машины"
    mode: single
    triggers:
      - trigger: homeassistant
        event: shutdown
        id: shutdown
      - trigger: homeassistant
        event: start
        id: start
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: shutdown
            sequence:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: binary_sensor.stiralnaia_mashina_aktivna
                        state: "on"
                    sequence:
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.washing_machine_pre_restart_state
                default:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.washing_machine_pre_restart_state
          - conditions:
              - condition: trigger
                id: start
            sequence:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.washing_machine_pre_restart_state
                        state: "on"
                    sequence:
                      - action: input_boolean.turn_on
                        target:
                          entity_id:
                            - input_boolean.washing_machine_running
                            - input_boolean.wm_cycle_seen_start
                default:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.washing_machine_running
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.washing_machine_pre_restart_state

  # ----------------------------------------------------------------------------
  # 2. ОСНОВНАЯ ЛОГИКА: СТАРТ + ОКОНЧАНИЕ + УВЕДОМЛЕНИЕ (ОБЪЕДИНЕНО!)
  # ----------------------------------------------------------------------------
  - id: "04a14878-99d3-4030-a17d-bfa3c75b1f9b"
    alias: "Стиральная машина: Управление циклом"
    mode: restart
    triggers:
      # СТАРТ: Мощность > 5 Вт
      - trigger: numeric_state
        entity_id: sensor.bathroom_washing_machine_power
        above: 5
        id: start
      # ОКОНЧАНИЕ: Мощность < 5 Вт в течение 2 минут
      - trigger: numeric_state
        entity_id: sensor.bathroom_washing_machine_power
        below: 5
        for:
          minutes: 2
        id: finish
    conditions:
      - condition: template
        value_template: >
          {{ states('sensor.bathroom_washing_machine_power') not in ['unknown','unavailable'] }}
    actions:
      - choose:
          # --- СТАРТ ЦИКЛА ---
          - conditions:
              - condition: trigger
                id: start
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id:
                    - input_boolean.washing_machine_running
                    - input_boolean.wm_cycle_seen_start
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.washing_machine_started_at
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

          # --- ОКОНЧАНИЕ ЦИКЛА ---
          - conditions:
              - condition: trigger
                id: finish
              # Убеждаемся, что мы считали, что стирка идет
              - condition: state
                entity_id: input_boolean.washing_machine_running
                state: "on"
              - condition: state
                entity_id: input_boolean.wm_cycle_seen_start
                state: "on"
            sequence:
              # 1. Проверяем длительность
              - choose:
                  - conditions:
                      - condition: template
                        value_template: >
                          {% set started = as_timestamp(states('input_datetime.washing_machine_started_at')) %}
                          {% set min_sec = (states('input_number.wm_min_cycle_min')|float(10)*60)|int %}
                          {{ started is number and (now().timestamp() - started) >= min_sec }}
                    sequence:
                      # 2. ОТПРАВЛЯЕМ УВЕДОМЛЕНИЕ (ПРЯМО ЗДЕСЬ!)
                      - choose:
                          - conditions:
                              - condition: state
                                entity_id: input_boolean.system_startup_phase
                                state: "off"
                              - condition: state
                                entity_id: input_boolean.silent_mode
                                state: "off"
                              - condition: state
                                entity_id: binary_sensor.someone_is_home
                                state: "on"
                            sequence:
                              - action: script.yandex_tts_washing_machine_finished
                              - action: notify.send_message
                                target:
                                  entity_id: notify.telegram_master
                                data:
                                  message: "🏠 Стирка закончена! 🧼"

              # 3. СБРАСЫВАЕМ ФЛАГИ (В ЛЮБОМ СЛУЧАЕ)
              - action: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.washing_machine_running
                    - input_boolean.wm_cycle_seen_start

  # ----------------------------------------------------------------------------
  # 3. НАПОМИНАНИЕ (15 мин после окончания)
  # ----------------------------------------------------------------------------
  - id: "washing_machine_reminder_no_motion"
    alias: "Уведомление: Напоминание о стирке при отсутствии движения"
    mode: single
    triggers:
      # Триггеримся по бинарному сенсору, т.к. флаги уже сброшены
      - trigger: state
        entity_id: binary_sensor.stiralnaia_mashina_zavershila_stirku
        to: "on"
        for:
          minutes: 15
    conditions:
      # Убеждаемся, что машина все еще не работает
      - condition: state
        entity_id: input_boolean.washing_machine_running
        state: "off"
      # И что в ванной никого нет
      - condition: state
        entity_id: binary_sensor.bathroom_motions
        state: "off"
      - condition: state
        entity_id: binary_sensor.bathroom_open_door
        state: "off"
      # Общие условия
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.silent_mode
        state: "off"
      - condition: state
        entity_id: binary_sensor.someone_is_home
        state: "on"
    actions:
      - action: script.yandex_tts_washing_machine_reminder

  # ----------------------------------------------------------------------------
  # 4. АВАРИЯ ПИТАНИЯ
  # ----------------------------------------------------------------------------
  - id: "91f99b09-a228-43af-9377-11069bff484b"
    alias: "Уведомление: Стиралка — розетка недоступна"
    mode: single
    triggers:
      - trigger: state
        entity_id: switch.bathroom_washing_machine
        to: "unavailable"
        for: "00:00:30"
        id: unavailable
      - trigger: state
        entity_id: switch.bathroom_washing_machine
        to: "unknown"
        for: "00:00:30"
        id: unknown
    conditions:
      - condition: state
        entity_id: input_boolean.washing_machine_running
        state: "on"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.wm_socket_outage_active
        state: "off"
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.wm_socket_outage_active
      - variables:
          started_at: "{{ states('input_datetime.washing_machine_started_at') }}"
          last_power: "{{ states('sensor.bathroom_washing_machine_power') }}"
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >-
            ⚠️ <b>Стиральная машина: питание недоступно</b>
            Розетка unavailable. Стирка начата: {{ started_at }}.
            Последняя P={{ last_power }} Вт.
      - action: script.yandex_tts_washing_machine_power_lost

  # ----------------------------------------------------------------------------
  # 5. ВОССТАНОВЛЕНИЕ ПИТАНИЯ
  # ----------------------------------------------------------------------------
  - id: "eb7b1bfa-4c3d-4a78-ac5b-eaa20756842c"
    alias: "Уведомление: Стиралка — питание восстановлено"
    mode: single
    triggers:
      - trigger: state
        entity_id: switch.bathroom_washing_machine
        from: "unavailable"
        for: "00:00:45"
      - trigger: state
        entity_id: switch.bathroom_washing_machine
        from: "unknown"
        for: "00:00:45"
    conditions:
      - condition: state
        entity_id: input_boolean.wm_socket_outage_active
        state: "on"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.wm_socket_outage_active
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "✅ Стиральная машина: питание восстановлено."
      - action: script.yandex_tts_washing_machine_power_restored

  # ----------------------------------------------------------------------------
  # 6. СБРОС ФЛАГА АВАРИИ ПРИ СТАРТЕ
  # ----------------------------------------------------------------------------
  - id: "bc7cc8c2-b6c3-4843-851b-e69d25a9bc78"
    alias: "HELPER: Сброс флага аварии стиралки при старте HA"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.wm_socket_outage_active
