################################################################################
# /packages/washing_machine.yaml
################################################################################
#
# КОНТРОЛЬ РАБОТЫ СТИРАЛЬНОЙ МАШИНЫ И НАПОМИНАНИЙ
#
# ФУНКЦИИ:
# 1. Определение старта и окончания цикла стирки
#    • Гистерезис через template binary sensors
#    • Защита от коротких колебаний мощности
#    • Проверка минимальной длительности цикла
#
# 2. Уведомления
#    • Сообщение в Telegram при завершении стирки
#    • Голосовое уведомление через Яндекс-колонку
#    • Отложенное напоминание, если ванной не пользуются 15 минут
#
# 3. Устойчивость к рестартам и сбоям питания
#    • Сохранение/восстановление состояния цикла при рестарте HA
#    • Детекция потери питания розетки стиральной машины
#    • Уведомление о восстановлении питания
#
# ЗАВИСИМОСТИ:
# • sensor.bathroom_washing_machine_power
# • switch.bathroom_washing_machine
# • binary_sensor.bathroom_open_door
# • binary_sensor.bathroom_motions
# • input_boolean.system_startup_phase
# • input_boolean.silent_mode
# • binary_sensor.someone_is_home
# • notify.telegram_master
# • script.yandex_tts_washing_machine_finished
# • script.yandex_tts_washing_machine_reminder
# • script.yandex_tts_washing_machine_power_lost
# • script.yandex_tts_washing_machine_power_restored
#
# ПРИМЕЧАНИЯ:
# • input_boolean.washing_machine_finished_pending — внутренний флаг, что
#   завершённая стирка ждёт отложенного напоминания
# • binary_sensor.no_activity_in_bathroom_recently — общий сенсор длительного
#   отсутствия активности в ванной; используется здесь для сценария напоминания
#
################################################################################

##############################################################################
#                        НАСТРАИВАЕМЫЕ ПАРАМЕТРЫ
##############################################################################

input_number:
  wm_min_cycle_min:
    name: "Стиралка: минимальная длительность цикла (мин)"
    min: 5
    max: 180
    step: 5
    initial: 10

input_datetime:
  washing_machine_started_at:
    name: "Стиралка: время старта цикла"
    has_date: true
    has_time: true

input_boolean:
  # ==========================================================================
  # Флаг ожидания отложенного напоминания
  # ==========================================================================
  # НАЗНАЧЕНИЕ:
  # • Поднимается после корректного завершения цикла стирки
  # • Сбрасывается:
  #   - при старте новой стирки
  #   - после отправки напоминания
  # • Нужен, чтобы напоминание не зависело от краткоживущего состояния
  #   binary_sensor.stiralnaia_mashina_zavershila_stirku
  # ==========================================================================
  washing_machine_finished_pending:
    name: "Стиралка: ожидается напоминание"
    icon: mdi:bell-ring-outline

##############################################################################
#                          БИНАРНЫЕ СЕНСОРЫ
##############################################################################

template:
  - binary_sensor:
      # ======================================================================
      # Стиральная машина активна
      # ======================================================================
      # ЛОГИКА:
      # • ON, если мощность > 5 Вт
      # • delay_on 20 сек — защита от кратких стартовых всплесков
      # • delay_off 2 мин — защита от коротких пауз в потреблении
      # ======================================================================
      - unique_id: stiralnaia_mashina_aktivna
        name: "Стиральная машина активна"
        delay_on:
          seconds: 20
        delay_off:
          minutes: 2
        availability: >
          {{ states('sensor.bathroom_washing_machine_power') not in ['unknown', 'unavailable', ''] }}
        state: >
          {{ (states('sensor.bathroom_washing_machine_power') | float(0)) > 5 }}
        icon: mdi:washing-machine

      # ======================================================================
      # Стиральная машина завершила стирку
      # ======================================================================
      # ЛОГИКА:
      # • ON, если мощность < 5 Вт не менее 2 минут
      # • Дополнительное условие:
      #   input_boolean.wm_cycle_seen_start = on
      #   (то есть система уже видела старт текущего цикла)
      #
      # ПРИМЕЧАНИЕ:
      # • Этот сенсор отражает факт завершения цикла
      # • Для напоминания используется отдельный persistent-флаг
      #   input_boolean.washing_machine_finished_pending
      # ======================================================================
      - unique_id: stiralnaia_mashina_zavershila_stirku
        name: "Стиральная машина завершила стирку"
        delay_on:
          minutes: 2
        availability: >
          {{ states('sensor.bathroom_washing_machine_power') not in ['unknown', 'unavailable', ''] }}
        state: >
          {{ (states('sensor.bathroom_washing_machine_power') | float(0)) < 5
             and is_state('input_boolean.wm_cycle_seen_start', 'on') }}
        icon: mdi:washing-machine-off

      # ======================================================================
      # Отсутствие активности в ванной (15 минут)
      # ======================================================================
      # НАЗНАЧЕНИЕ:
      # • Определяет, что ванной долго не пользуются
      # • Используется для напоминания о завершённой стирке
      #
      # ЛОГИКА:
      # • Сенсор становится ON, если:
      #   - дверь ванной закрыта
      #   - движения в ванной нет
      #   - это состояние сохраняется 15 минут (delay_on)
      #
      # ПРИМЕЧАНИЕ:
      # • Это сенсор "длительного отсутствия активности", а не мгновенное
      #   состояние "сейчас никого нет"
      # ======================================================================
      - unique_id: no_activity_in_bathroom_recently
        name: no_activity_in_bathroom_recently
        device_class: problem
        delay_on:
          minutes: 15
        availability: >-
          {{ states('binary_sensor.bathroom_open_door') not in ['unknown', 'unavailable']
             and states('binary_sensor.bathroom_motions') not in ['unknown', 'unavailable'] }}
        state: >-
          {{ is_state('binary_sensor.bathroom_open_door', 'off')
             and is_state('binary_sensor.bathroom_motions', 'off') }}
        icon: >-
          {% if is_state('binary_sensor.no_activity_in_bathroom_recently', 'on') %}
            mdi:clock-alert
          {% else %}
            mdi:clock-check
          {% endif %}

##############################################################################
#                               АВТОМАТИЗАЦИИ
##############################################################################

automation:
  # ----------------------------------------------------------------------------
  # 1. СОХРАНЕНИЕ/ВОССТАНОВЛЕНИЕ ПРИ РЕСТАРТЕ
  # ----------------------------------------------------------------------------
  - id: "064cbd85-8d52-40ac-98bd-98164ad1434c"
    alias: "HELPER: Сохранение/восстановление состояния стиральной машины"
    mode: single
    description: >
      Сохраняет факт активной стирки перед shutdown и восстанавливает
      состояние флагов после старта HA.
    triggers:
      - trigger: homeassistant
        event: shutdown
        id: shutdown
      - trigger: homeassistant
        event: start
        id: start

    actions:
      - choose:
          # --------------------------------------------------------------------
          # ПЕРЕД ВЫКЛЮЧЕНИЕМ HA
          # --------------------------------------------------------------------
          - conditions:
              - condition: trigger
                id: shutdown
            sequence:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: binary_sensor.stiralnaia_mashina_aktivna
                        state: "on"
                    sequence:
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.washing_machine_pre_restart_state
                default:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.washing_machine_pre_restart_state

          # --------------------------------------------------------------------
          # ПОСЛЕ СТАРТА HA
          # --------------------------------------------------------------------
          - conditions:
              - condition: trigger
                id: start
            sequence:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.washing_machine_pre_restart_state
                        state: "on"
                    sequence:
                      - action: input_boolean.turn_on
                        target:
                          entity_id:
                            - input_boolean.washing_machine_running
                            - input_boolean.wm_cycle_seen_start

                      # Если цикл продолжается после рестарта,
                      # напоминание о завершении не должно висеть.
                      - action: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.washing_machine_finished_pending

                default:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.washing_machine_running

              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.washing_machine_pre_restart_state

  # ----------------------------------------------------------------------------
  # 2. ОСНОВНАЯ ЛОГИКА: СТАРТ + ОКОНЧАНИЕ + УВЕДОМЛЕНИЕ
  # ----------------------------------------------------------------------------
  - id: "04a14878-99d3-4030-a17d-bfa3c75b1f9b"
    alias: "Стиральная машина: Управление циклом"
    mode: restart
    description: >
      Обрабатывает старт и завершение цикла стирки.

      СТАРТ:
      • мощность > 5 Вт

      ОКОНЧАНИЕ:
      • мощность < 5 Вт в течение 2 минут
      • цикл действительно считался активным
      • длительность цикла >= input_number.wm_min_cycle_min

      ПОСЛЕ УСПЕШНОГО ЗАВЕРШЕНИЯ:
      • отправляет основное уведомление
      • поднимает флаг washing_machine_finished_pending
      • сбрасывает флаги running / seen_start
    triggers:
      - trigger: numeric_state
        entity_id: sensor.bathroom_washing_machine_power
        above: 5
        id: start

      - trigger: numeric_state
        entity_id: sensor.bathroom_washing_machine_power
        below: 5
        for:
          minutes: 2
        id: finish

    conditions:
      - condition: template
        value_template: >
          {{ states('sensor.bathroom_washing_machine_power') not in ['unknown','unavailable'] }}

    actions:
      - choose:
          # --------------------------------------------------------------------
          # СТАРТ ЦИКЛА
          # --------------------------------------------------------------------
          - conditions:
              - condition: trigger
                id: start
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id:
                    - input_boolean.washing_machine_running
                    - input_boolean.wm_cycle_seen_start

              # Новая стирка = старое напоминание больше не актуально
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.washing_machine_finished_pending

              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.washing_machine_started_at
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

          # --------------------------------------------------------------------
          # ОКОНЧАНИЕ ЦИКЛА
          # --------------------------------------------------------------------
          - conditions:
              - condition: trigger
                id: finish
              - condition: state
                entity_id: input_boolean.washing_machine_running
                state: "on"
              - condition: state
                entity_id: input_boolean.wm_cycle_seen_start
                state: "on"
            sequence:
              - choose:
                  # --------------------------------------------------------------
                  # Проверка минимальной длительности реального цикла
                  # --------------------------------------------------------------
                  - conditions:
                      - condition: template
                        value_template: >
                          {% set started = as_timestamp(states('input_datetime.washing_machine_started_at')) %}
                          {% set min_sec = (states('input_number.wm_min_cycle_min') | float(10) * 60) | int %}
                          {{ started is number and (now().timestamp() - started) >= min_sec }}
                    sequence:
                      # ----------------------------------------------------------
                      # Основное уведомление о завершении
                      # ----------------------------------------------------------
                      - choose:
                          - conditions:
                              - condition: state
                                entity_id: input_boolean.system_startup_phase
                                state: "off"
                              - condition: state
                                entity_id: input_boolean.silent_mode
                                state: "off"
                              - condition: state
                                entity_id: binary_sensor.someone_is_home
                                state: "on"
                            sequence:
                              - action: script.yandex_tts_washing_machine_finished
                              - action: notify.send_message
                                target:
                                  entity_id: notify.telegram_master
                                data:
                                  message: "🏠 Стирка закончена! 🧼"

                      # ----------------------------------------------------------
                      # Поднимаем флаг отложенного напоминания
                      # ----------------------------------------------------------
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.washing_machine_finished_pending

              # --------------------------------------------------------------
              # Сбрасываем флаги состояния цикла в любом случае
              # --------------------------------------------------------------
              - action: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.washing_machine_running
                    - input_boolean.wm_cycle_seen_start

  # ----------------------------------------------------------------------------
  # 3. НАПОМИНАНИЕ, ЕСЛИ ВАННОЙ НЕ ПОЛЬЗУЮТСЯ 15 МИНУТ
  # ----------------------------------------------------------------------------
  - id: "washing_machine_reminder_no_motion"
    alias: "Уведомление: Напоминание о стирке при отсутствии активности в ванной"
    mode: single
    description: >
      Отправляет голосовое напоминание о завершённой стирке, если ванной
      не пользуются уже 15 минут.

      ТРИГГЕР:
      • binary_sensor.no_activity_in_bathroom_recently: off → on

      УСЛОВИЯ:
      • Есть отложенное напоминание о завершённой стирке
      • Стиральная машина уже не активна
      • Система полностью загружена
      • Не включён режим тишины
      • Кто-то дома

      ДЕЙСТВИЯ:
      • Проигрывает TTS-напоминание
      • Сбрасывает флаг ожидающего напоминания
    triggers:
      - trigger: state
        entity_id: binary_sensor.no_activity_in_bathroom_recently
        to: "on"

    conditions:
      - condition: state
        entity_id: input_boolean.washing_machine_finished_pending
        state: "on"

      - condition: state
        entity_id: input_boolean.washing_machine_running
        state: "off"

      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"

      - condition: state
        entity_id: input_boolean.silent_mode
        state: "off"

      - condition: state
        entity_id: binary_sensor.someone_is_home
        state: "on"

    actions:
      - action: script.yandex_tts_washing_machine_reminder
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.washing_machine_finished_pending

  # ----------------------------------------------------------------------------
  # 4. АВАРИЯ ПИТАНИЯ РОЗЕТКИ СТИРАЛЬНОЙ МАШИНЫ
  # ----------------------------------------------------------------------------
  - id: "91f99b09-a228-43af-9377-11069bff484b"
    alias: "Уведомление: Стиралка — розетка недоступна"
    mode: single
    description: >
      Сообщает о потере питания розетки, если это произошло во время активной
      стирки.
    triggers:
      - trigger: state
        entity_id: switch.bathroom_washing_machine
        to: "unavailable"
        for: "00:00:30"
        id: unavailable
      - trigger: state
        entity_id: switch.bathroom_washing_machine
        to: "unknown"
        for: "00:00:30"
        id: unknown

    conditions:
      - condition: state
        entity_id: input_boolean.washing_machine_running
        state: "on"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.wm_socket_outage_active
        state: "off"

    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.wm_socket_outage_active

      - variables:
          started_at: "{{ states('input_datetime.washing_machine_started_at') }}"
          last_power: "{{ states('sensor.bathroom_washing_machine_power') }}"

      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >-
            ⚠️ <b>Стиральная машина: питание недоступно</b>
            Розетка unavailable. Стирка начата: {{ started_at }}.
            Последняя P={{ last_power }} Вт.

      - action: script.yandex_tts_washing_machine_power_lost

  # ----------------------------------------------------------------------------
  # 5. ВОССТАНОВЛЕНИЕ ПИТАНИЯ
  # ----------------------------------------------------------------------------
  - id: "eb7b1bfa-4c3d-4a78-ac5b-eaa20756842c"
    alias: "Уведомление: Стиралка — питание восстановлено"
    mode: single
    description: >
      Сообщает, что питание розетки стиральной машины восстановилось.
    triggers:
      - trigger: state
        entity_id: switch.bathroom_washing_machine
        from: "unavailable"
        for: "00:00:45"
      - trigger: state
        entity_id: switch.bathroom_washing_machine
        from: "unknown"
        for: "00:00:45"

    conditions:
      - condition: state
        entity_id: input_boolean.wm_socket_outage_active
        state: "on"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"

    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.wm_socket_outage_active

      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "✅ Стиральная машина: питание восстановлено."

      - action: script.yandex_tts_washing_machine_power_restored

  # ----------------------------------------------------------------------------
  # 6. СБРОС ФЛАГА АВАРИИ ПРИ СТАРТЕ HA
  # ----------------------------------------------------------------------------
  - id: "bc7cc8c2-b6c3-4843-851b-e69d25a9bc78"
    alias: "HELPER: Сброс флага аварии стиралки при старте HA"
    mode: single
    description: >
      Сбрасывает флаг аварии питания при запуске Home Assistant.
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.wm_socket_outage_active
