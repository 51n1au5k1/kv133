################################################################################
# /packages/telegram_bot.yaml
################################################################################
#
# Пакет: Telegram Bot для Home Assistant (OPTIMIZED)
#
# Основные улучшения в этой версии:
# 1. Реально работают input_boolean для логов и input_number для задержек.
# 2. Блок управления PVE (Proxmox) переписан в одну умную автоматизацию
#    вместо 30 отдельных (используется mapping команд).
# 3. Исправлена ошибка в кнопке Stop для Deluge.
#
################################################################################

input_number:
  telegram_delay_ms:
    name: "Задержка PVE действий (сек)" # Переименовал для ясности
    min: 1
    max: 10
    step: 1
    initial: 5
    icon: mdi:timer-sand

input_boolean:
  telegram_bot_log_commands:
    name: "Логировать команды Telegram"
    initial: true
    icon: mdi:math-log

##############################################################################
#                                СКРИПТЫ
##############################################################################

script:
  # --------------------------------------------------------------------------
  # Универсальный переключатель устройств
  # --------------------------------------------------------------------------
  toggle_device:
    alias: "Общий скрипт для toggle устройства и обновления меню"
    fields:
      entity:
        description: "Entity ID для toggle"
        required: true
      domain:
        description: "Domain (light/switch/fan)"
        required: true
      menu_script:
        description: "Скрипт для отправки обновлённого меню"
        required: true
      message_id:
        description: "ID сообщения для удаления"
        required: true
      chat_id:
        description: "ID чата"
        required: true
      user_id:
        description: "ID пользователя"
        required: false
    sequence:
      # 1. Выполняем действие
      - service: >-
          {% if domain == 'climate' %}
            climate.turn_{{ 'on' if is_state(entity, 'off') else 'off' }}
          {% else %}
            {{ domain }}.toggle
          {% endif %}
        target:
          entity_id: "{{ entity }}"

      # 2. Удаляем старое сообщение (чтобы не было дублей)
      - service: telegram_bot.delete_message
        data:
          message_id: "{{ message_id }}"
          chat_id: "{{ chat_id }}"

      # 3. Отправляем обновленное меню
      - service: "{{ menu_script }}"
        data:
          target: "{{ chat_id }}"

      # 4. Логируем (если включено)
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.telegram_bot_log_commands
                state: "on"
            sequence:
              - service: system_log.write
                data:
                  message: "TG: Toggle {{ entity }} by user: {{ user_id | default('unknown') }}"
                  level: info

  # --------------------------------------------------------------------------
  # PVE Action (Действие с задержкой и обновлением)
  # --------------------------------------------------------------------------
  pve_action:
    alias: "PVE Action with Delay"
    fields:
      button: { required: true }
      chat_id: { required: true }
      user_id: { required: false }
    sequence:
      - service: button.press
        target:
          entity_id: "{{ button }}"
      # Используем настройку задержки из input_number
      - delay:
          seconds: "{{ states('input_number.telegram_delay_ms') | int(5) }}"
      - service: script.send_pve_status
        data:
          target: "{{ chat_id }}"
      # Логирование
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.telegram_bot_log_commands
                state: "on"
            sequence:
              - service: system_log.write
                data:
                  message: "TG: PVE Action {{ button }} by {{ user_id | default('unknown') }}"
                  level: info

  # --------------------------------------------------------------------------
  # Генераторы меню (Send Status Scripts)
  # --------------------------------------------------------------------------
  send_main_menu:
    alias: "Send Main Menu"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>💻 Выбрать комнату для управления :</b>
          inline_keyboard: >
            {{ [
                [ ["🏠 Гостиная", "/livingroom_control"], ["🍽 Кухня", "/kitchen_control"] ],
                [ ["🏢 Рабочий кабинет", "/workroom_control"], ["🛏 Спальня", "/bedroom_control"] ],
                [ ["🛁 Ванная", "/bathroom_control"], ["🚪 Коридор", "/hallway_control"] ],
                [ ["🖥 Система", "/system_control"] ]
              ] | tojson }}

  send_livingroom_status:
    alias: "Send Living Room Status"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>🏠 Текущее состояние в гостиной:</b>
            🌡 <b>Температура:</b> {{ states('sensor.livingroom_climat_sensor_temperature') | default('N/A') }}°C
            💧 <b>Влажность:</b> {{ states('sensor.livingroom_climat_sensor_humidity') | default('N/A') }}%
            🌿 <b>CO₂:</b> {{ states('sensor.co2_monitor_co2') | default('N/A') }} ppm
            💨 <b>PM2.5:</b> {{ states('sensor.zhimi_cn_271517251_mb3_pm2_5_density_p_3_6') | default('N/A') }} µg/m³
            🚪 <b>Статус дверей:</b> {% if is_state('binary_sensor.gostinaia_balkon_contact','on') or is_state('binary_sensor.0x00158d0003ce9922_contact','on') %}Открыта{% else %}Закрыта{% endif %}
          inline_keyboard: >
            {{ [
                [ ["🔴 Люстра" if is_state("light.livingroom_main_switch_left", "off") else "🟢 Люстра", "/toggle_livingroom_main_switch_left"],
                  ["🔴 Свет над диваном" if is_state("light.livingroom_main_switch_right", "off") else "🟢 Свет над диваном", "/toggle_livingroom_main_switch_right"],
                  ["🔴 Бра" if is_state("light.livingroom_scone_dimmer", "off") else "🟢 Бра", "/toggle_livingroom_scone_dimmer"] ],
                [ ["🔴 Кондиционер" if is_state("climate.konditsioner", "off") else "🟢 Кондиционер", "/toggle_livingroom_konditsioner"],
                  ["🔴 Очиститель" if is_state("fan.zhimi_cn_271517251_mb3_s_2_air_purifier", "off") else "🟢 Очиститель", "/toggle_livingroom_air_purifier"],
                  ["🔴 Увлажнитель" if is_state("humidifier.xiaomi_cn_823407205_p3", "off") else "🟢 Увлажнитель", "/toggle_livingroom_humidifier"] ],
                [ ["🔴 Угловая розетка" if is_state("switch.livingroom_socket_corner_r", "off") else "🟢 Угловая розетка", "/toggle_livingroom_socket_corner_r"],
                  ["🔴 Левая розетка" if is_state("switch.livingroom_socket_l", "off") else "🟢 Левая розетка", "/toggle_livingroom_socket_l"],
                  ["🔴 Правая розетка" if is_state("switch.livingroom_socket_r", "off") else "🟢 Правая розетка", "/toggle_livingroom_socket_r"] ],
                [ ["👈 В меню", "/menu_back"], ["↻ Обновить", "/livingroom_control"] ]
              ] | tojson }}

  send_workroom_status:
    alias: "Send Workroom Status"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>🏢 Текущее состояние в рабочем кабинете:</b>
            <b>🌡 Температура:</b> {{ states('sensor.cgllc_cn_blt_3_15gd8656slo00_dove_temperature_p_2_1') | default('N/A') }}°C
            <b>💧 Влажность:</b> {{ states('sensor.cgllc_cn_blt_3_15gd8656slo00_dove_relative_humidity_p_2_2') | default('N/A') }}%
            <b>🚪 Статус двери:</b> {% if is_state('binary_sensor.masterskaia_balkon_contact', 'on') %}Открыта{% else %}Закрыта{% endif %}
          inline_keyboard: >
            {{ [
                [ ["🔴 Основной свет" if is_state("light.workroom_switch", "off") else "🟢 Основной свет", "/toggle_workroom_light"],
                  ["🔴 Подсветка" if is_state("light.working_room_led", "off") else "🟢 Подсветка", "/toggle_workroom_led"] ],
                [ ["🔴 Розетка отпаривателя" if is_state("switch.smart_plug_in_unit_vykliuchatel", "off") else "🟢 Розетка отпаривателя", "/toggle_workroom_plug"] ],
                [ ["👈 В меню", "/menu_back"], ["↻ Обновить", "/workroom_control"] ]
              ] | tojson }}

  send_bedroom_status:
    alias: "Send Bedroom Status"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>🛏 Текущее состояние в спальне:</b>
            <b>🌡 Температура:</b> {{ states('sensor.bedroom_th_sensor_temperature') | default('N/A') }}°C
            <b>💧 Влажность:</b> {{ states('sensor.bedroom_th_sensor_humidity') | default('N/A') }}%
            <b>🚪 Статус двери:</b> {% if is_state('binary_sensor.0x00158d00044d5d11_contact', 'on') %}Открыта{% else %}Закрыта{% endif %}
          inline_keyboard: >
            {{ [
                [ ["🔴 Основной свет" if is_state("light.bedroom_switch_main", "off") else "🟢 Основной свет", "/toggle_bedroom_light"] ],
                [ ["🔴 Светильник Слева" if is_state("light.bedroom_left_switch_right", "off") else "🟢 Светильник Слева", "/toggle_bedroom_scone_t"] ],
                [ ["🔴 Светильник Справа малый" if is_state("light.bedroom_right_switch_left", "off") else "🟢 Светильник Справа малый", "/toggle_bedroom_scone_a_small"],
                  ["🔴 Светильник Справа большой" if is_state("light.bedroom_right_switch_right", "off") else "🟢 Светильник Справа большой", "/toggle_bedroom_scone_a_big"] ],
                [ ["🔴 Розетка Слева" if is_state("switch.0x00158d0002530bd9", "off") else "🟢 Розетка Слева", "/toggle_bedroom_plug_left"],
                  ["🔴 Розетка Справа" if is_state("switch.0x00158d0002530ba3", "off") else "🟢 Розетка Справа", "/toggle_bedroom_plug_right"] ],
                [ ["👈 В меню", "/menu_back"], ["↻ Обновить", "/bedroom_control"] ]
              ] | tojson }}

  send_bathroom_status:
    alias: "Send Bathroom Status"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>🛁 Текущее состояние в ванной:</b>
            <b>🌡 Температура:</b> {{ states('sensor.bathroom_th_2_temperature') | default('N/A') }}°C
            <b>💧 Влажность:</b> {{ states('sensor.bathroom_th_2_humidity') | default('N/A') }}%
            <b>🚪 Статус двери:</b> {% if is_state('binary_sensor.bathroom_open_door', 'on') %}Открыта{% else %}Закрыта{% endif %}
            <b>🧺 Стиральная машина:</b> {% if is_state('input_boolean.washing_machine_running', 'on') %}🟢 Работает{% else %}🔴 Не работает{% endif %}
          inline_keyboard: >
            {{ [
                [ ["🔴 Весь свет" if is_state("light.light_bathroom", "off") else "🟢 Весь свет", "/toggle_bathroom_light"] ],
                [ ["🔴 Вытяжка" if is_state("fan.bathroom_relay_l1", "off") else "🟢 Вытяжка", "/toggle_bathroom_fan"] ],
                [ ["👈 В меню", "/menu_back"], ["↻ Обновить", "/bathroom_control"] ]
              ] | tojson }}

  send_kitchen_status:
    alias: "Send Kitchen Status"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>🍽 Текущее состояние на кухне:</b>
            <b>🌡 Температура:</b> {{ states('sensor.kitchen_th_temperature') | default('N/A') }}°C
            <b>💧 Влажность:</b> {{ states('sensor.kitchen_th_humidity') | default('N/A') }}%
            <b>🚪 Статус двери:</b> {% if is_state('binary_sensor.0x00158d0003ce9922_contact', 'on') %}Открыта{% else %}Закрыта{% endif %}
          inline_keyboard: >
            {{ [
                [ ["🔴 Вытяжка" if is_state("switch.sonoff_10024c81be", "off") else "🟢 Вытяжка", "/toggle_kitchen_fan"] ],
                [ ["🔴 Основной" if is_state("light.kitchen_main_light", "off") else "🟢 Основной", "/toggle_kitchen_main_light"],
                  ["🔴 Подсветка" if is_state("switch.kitchen_fartuh", "off") else "🟢 Подсветка", "/toggle_kitchen_fartuh"] ],
                [ ["👈 В меню", "/menu_back"], ["↻ Обновить", "/kitchen_control"] ]
              ] | tojson }}

  send_hallway_status:
    alias: "Send Hallway Status"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>🚪 Текущее состояние в прихожей:</b>
            <b>🚪 Статус двери:</b> {% if is_state('binary_sensor.hallway_door_contact', 'on') %}Открыта{% else %}Закрыта{% endif %}
          inline_keyboard: >
            {{ [
                [ ["🔴 Свет" if is_state("light.hallway_switch", "off") else "🟢 Свет", "/toggle_hallway_light"],
                  ["🔴 Шлюз" if is_state("light.gateway_light_04cf8c977cdd", "off") else "🟢 Шлюз", "/toggle_hallway_gateway_light"] ],
                [ ["👈 В меню", "/menu_back"], ["↻ Обновить", "/hallway_control"] ]
              ] | tojson }}

  send_system_status:
    alias: "Send System Status"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>🖥 Текущее состояние системы:</b>
            <b>🌡 Климат около сервера:</b>
            <b>Температура:</b> {{ states('sensor.0xa4c13861a18df7c8_temperature') | default('N/A') }}°C
            <b>💧 Влажность:</b> {{ states('sensor.0xa4c13861a18df7c8_humidity') | default('N/A') }}%

            <b>🌍 Скорость сети интернет:</b>
            <b>📡 Пинг:</b> {{ states('sensor.speedtest_ping') | default('N/A') }} ms
            <b>⬇️ Загрузка:</b> {{ states('sensor.speedtest_download') | default('N/A') }} Mbps
            <b>⬆️ Передача:</b> {{ states('sensor.speedtest_upload') | default('N/A') }} Mbps
          inline_keyboard: >
            {{ [
                [ ["🔴 Питание ванной" if is_state("light.bathroom_main", "off") else "🟢 Питание ванной", "/toggle_bathroom_power"] ],
                [ ["🔴 Режим тишины" if is_state("input_boolean.silent_mode", "off") else "🟢 Режим тишины", "/toggle_silent_mode"] ],
                [ ["🔴 Режим Force CCTV Off" if is_state("input_boolean.force_camera_off", "off") else "🟢 Режим Force CCTV Off", "/toggle_force_cctv_mode"] ],
                [ ["⚠️ Система виртуализации", "/pve_status_refresh"] ],
                [ ["⚠️ Перезагрузить систему", "/confirm_reboot"] ],
                [ ["👈 В меню", "/menu_back"], ["↻ Обновить", "/system_control"] ]
              ] | tojson }}

  send_pve_status:
    alias: "Отправить статус PVE"
    sequence:
      - service: telegram_bot.send_message
        data:
          target: "{{ target }}"
          parse_mode: html
          message: |
            <b>🖥 Статус Proxmox (Node: pve)</b>

            <b>📊 Сводка:</b>
            ВМ: {{ states('sensor.node_pve_virtual_machines_running') }} | LXC: {{ states('sensor.node_pve_containers_running') }}
            CPU: {{ states('sensor.node_pve_cpu_used') | round(1) }}% | RAM: {{ states('sensor.node_pve_memory_used_percentage') | round(1) }}%

            <b>📦 Состояние (CPU | RAM):</b>

            {# Макрос для вывода строки статуса LXC #}
            {%- macro status(entity_id, name, cpu_sensor, ram_sensor) -%}
            {{ '🟢' if is_state(entity_id, 'on') else '🔴' }} <b>{{ name }}:</b> {{ states(cpu_sensor) | float(0) | round(0) }}% | {{ states(ram_sensor) | float(0) | round(0) }}%
            {%- endmacro -%}

            {# VM HAOS12 (вручную, так как это VM) #}
            {{ '🟢' if is_state('binary_sensor.qemu_haos12_3_100_status', 'on') else '🔴' }} <b>HAOS12:</b> {{ states('sensor.qemu_haos12_3_100_cpu_used') | float(0) | round(0) }}% | {{ states('sensor.qemu_haos12_3_100_memory_used_percentage') | float(0) | round(0) }}%
            {# VM CHR (вручную, так как это VM) #}
            {{ '🟢' if is_state('binary_sensor.qemu_mikrotik_routeros_chr_200_status', 'on') else '🔴' }} <b>CHR:</b> {{ states('sensor.qemu_mikrotik_routeros_chr_200_cpu_used') | float(0) | round(0) }}% | {{ states('sensor.qemu_mikrotik_routeros_chr_200_memory_used_percentage') | float(0) | round(0) }}%

            {# LXC Контейнеры (через макрос) #}
            {{ status('binary_sensor.lxc_mariadb_101_status', 'MariaDB', 'sensor.lxc_mariadb_101_cpu_used', 'sensor.lxc_mariadb_101_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_jackett_102_status', 'Jackett', 'sensor.lxc_jackett_102_cpu_used', 'sensor.lxc_jackett_102_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_jellyfin_103_status', 'Jellyfin', 'sensor.lxc_jellyfin_103_cpu_used', 'sensor.lxc_jellyfin_103_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_deluge_104_status', 'Deluge', 'sensor.lxc_deluge_104_cpu_used', 'sensor.lxc_deluge_104_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_debian_105_status', 'TorrServer', 'sensor.lxc_debian_105_cpu_used', 'sensor.lxc_debian_105_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_immich_106_status', 'Immich', 'sensor.lxc_immich_106_cpu_used', 'sensor.lxc_immich_106_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_minim_107_status', 'MinimServer', 'sensor.lxc_minim_107_cpu_used', 'sensor.lxc_minim_107_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_photoview_108_status', 'Photoview', 'sensor.lxc_photoview_108_cpu_used', 'sensor.lxc_photoview_108_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_npmplus_109_status', 'NPMplus', 'sensor.lxc_npmplus_109_cpu_used', 'sensor.lxc_npmplus_109_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_alpine_vaultwarden_110_status', 'MinimServer', 'sensor.lxc_alpine_vaultwarden_110_cpu_used', 'sensor.lxc_alpine_vaultwarden_110_memory_used_percentage') }}
            {{ status('binary_sensor.lxc_pihole_111_status', 'Photoview', 'sensor.lxc_pihole_111_cpu_used', 'sensor.lxc_pihole_111_memory_used_percentage') }}

          inline_keyboard: >
            {% set s_haos = is_state('binary_sensor.qemu_haos12_3_100_status', 'on') %}
            {% set s_chr = is_state('binary_sensor.qemu_mikrotik_routeros_chr_200_status', 'on') %}
            {% set s_maria = is_state('binary_sensor.lxc_mariadb_101_status', 'on') %}
            {% set s_jack = is_state('binary_sensor.lxc_jackett_102_status', 'on') %}
            {% set s_jelly = is_state('binary_sensor.lxc_jellyfin_103_status', 'on') %}
            {% set s_deluge = is_state('binary_sensor.lxc_deluge_104_status', 'on') %}
            {% set s_torr = is_state('binary_sensor.lxc_debian_105_status', 'on') %}
            {% set s_immich = is_state('binary_sensor.lxc_immich_106_status', 'on') %}
            {% set s_minim = is_state('binary_sensor.lxc_minim_107_status', 'on') %}
            {% set s_photo = is_state('binary_sensor.lxc_photoview_108_status', 'on') %}
            {% set s_immich = is_state('binary_sensor.lxc_npmplus_109_status', 'on') %}
            {% set s_minim = is_state('binary_sensor.lxc_alpine_vaultwarden_110_status', 'on') %}
            {% set s_photo = is_state('binary_sensor.lxc_pihole_111_status', 'on') %}

            {{ [
                [ ["🔄 Обновить статус", "/pve_status_refresh"] ],
                
                [ ["🟢 HAOS12" if s_haos else "🔴 HAOS12", "/reboot_haos12"] ],

                [ ["🟢 CHR" if s_chr else "🔴 CHR", "/reboot_chr"] ],

                [ ["🟢 MariaDB" if s_maria else "🔴 MariaDB", "/start_mariadb"], 
                  ["⏹ Стоп", "/stop_mariadb"], ["🔄 Ребут", "/reboot_mariadb"] ],

                [ ["🟢 Jackett" if s_jack else "🔴 Jackett", "/start_jackett"], 
                  ["⏹ Стоп", "/stop_jackett"], ["🔄 Ребут", "/reboot_jackett"] ],

                [ ["🟢 Jellyfin" if s_jelly else "🔴 Jellyfin", "/start_jellyfin"], 
                  ["⏹ Стоп", "/stop_jellyfin"], ["🔄 Ребут", "/reboot_jellyfin"] ],

                [ ["🟢 Deluge" if s_deluge else "🔴 Deluge", "/start_deluge"], 
                  ["⏹ Стоп", "/stop_deluge"], ["🔄 Ребут", "/reboot_deluge"] ],

                [ ["🟢 TorrServer" if s_torr else "🔴 TorrServer", "/start_torrserver"], 
                  ["⏹ Стоп", "/stop_torrserver"], ["🔄 Ребут", "/reboot_torrserver"] ],

                [ ["🟢 Immich" if s_immich else "🔴 Immich", "/start_immich"], 
                  ["⏹ Стоп", "/stop_immich"], ["🔄 Ребут", "/reboot_immich"] ],

                [ ["🟢 Minim" if s_minim else "🔴 Minim", "/start_minimserver"], 
                  ["⏹ Стоп", "/stop_minimserver"], ["🔄 Ребут", "/reboot_minimserver"] ],

                [ ["🟢 Photoview" if s_photo else "🔴 Photoview", "/start_photoview"], 
                  ["⏹ Стоп", "/stop_photoview"], ["🔄 Ребут", "/reboot_photoview"] ],

                [ ["🟢 NPMplus" if s_npmplus else "🔴 NPMplus", "/start_npmplus"], 
                  ["⏹ Стоп", "/stop_npmplus"], ["🔄 Ребут", "/reboot_npmplus"] ],

                [ ["🟢 VaultWarden" if s_vaultwarden else "🔴 VaultWarden", "/start_vaultwarden"], 
                  ["⏹ Стоп", "/stop_vaultwarden"], ["🔄 Ребут", "/reboot_vaultwarden"] ],

                [ ["🟢 PiHole" if s_pihole else "🔴 PiHole", "/start_pihole"], 
                  ["⏹ Стоп", "/stop_pihole"], ["🔄 Ребут", "/reboot_pihole"] ],

                [ ["👈 В меню", "/menu_back"] ]
              ] | tojson }}

##############################################################################
#                             АВТОМАТИЗАЦИИ
##############################################################################

automation:
  # ==========================================================================
  # Базовые обработчики (Start, Меню)
  # ==========================================================================
  - id: "telegram_bot_start"
    alias: "Telegram Bot Start (Приветствие)"
    initial_state: true
    triggers:
      - platform: event
        event_type: telegram_command
        event_data:
          command: "/start"
    actions:
      - service: telegram_bot.send_message
        data:
          target: "{{ trigger.event.data.chat_id }}"
          parse_mode: html
          message: "<b>Добро пожаловать в умный дом!</b>"
      - service: script.send_main_menu
        data:
          target: "{{ trigger.event.data.chat_id }}"

  - id: "telegram_bot_main_menu"
    alias: "Telegram Bot Main Menu"
    initial_state: true
    triggers:
      - platform: event
        event_type: telegram_command
        event_data:
          command: "/main_menu"
    actions:
      - service: script.send_main_menu
        data:
          target: "{{ trigger.event.data.chat_id }}"

  - id: "telegram_bot_menu_back"
    alias: "Telegram Bot Menu Back"
    initial_state: true
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/menu_back"
    actions:
      - service: telegram_bot.delete_message
        data:
          message_id: "{{ trigger.event.data.message.message_id }}"
          chat_id: "{{ trigger.event.data.chat_id }}"
      - service: script.send_main_menu
        data:
          target: "{{ trigger.event.data.chat_id }}"

  # ==========================================================================
  # Навигация по комнатам (Оптимизировано: вызов соответствующих скриптов)
  # ==========================================================================
  - id: "telegram_bot_room_navigation"
    alias: "Telegram Bot: Навигация по комнатам"
    initial_state: true
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/livingroom_control"
        id: "livingroom"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/workroom_control"
        id: "workroom"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/bedroom_control"
        id: "bedroom"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/kitchen_control"
        id: "kitchen"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/bathroom_control"
        id: "bathroom"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/hallway_control"
        id: "hallway"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/system_control"
        id: "system"
    actions:
      - service: telegram_bot.delete_message
        data:
          message_id: "{{ trigger.event.data.message.message_id }}"
          chat_id: "{{ trigger.event.data.chat_id }}"
      - choose:
          - conditions:
              - condition: trigger
                id: "livingroom"
            sequence:
              - service: script.send_livingroom_status
                data:
                  target: "{{ trigger.event.data.chat_id }}"
          - conditions:
              - condition: trigger
                id: "workroom"
            sequence:
              - service: script.send_workroom_status
                data:
                  target: "{{ trigger.event.data.chat_id }}"
          - conditions:
              - condition: trigger
                id: "bedroom"
            sequence:
              - service: script.send_bedroom_status
                data:
                  target: "{{ trigger.event.data.chat_id }}"
          - conditions:
              - condition: trigger
                id: "kitchen"
            sequence:
              - service: script.send_kitchen_status
                data:
                  target: "{{ trigger.event.data.chat_id }}"
          - conditions:
              - condition: trigger
                id: "bathroom"
            sequence:
              - service: script.send_bathroom_status
                data:
                  target: "{{ trigger.event.data.chat_id }}"
          - conditions:
              - condition: trigger
                id: "hallway"
            sequence:
              - service: script.send_hallway_status
                data:
                  target: "{{ trigger.event.data.chat_id }}"
          - conditions:
              - condition: trigger
                id: "system"
            sequence:
              - service: script.send_system_status
