################################################################################
# /packages/telegram_bot.yaml
################################################################################
#
# Пакет: Telegram Bot для Home Assistant (OPTIMIZED)
#
# Основные улучшения в этой версии:
# 1. Реально работают input_boolean для логов и input_number для задержек.
# 2. Блок управления PVE (Proxmox) переписан в одну умную автоматизацию
#    вместо 30 отдельных (используется mapping команд).
# 3. Исправлена ошибка в кнопке Stop для Deluge.
# 4. Убрано устаревшее использование target в telegram_bot.send_message:
#    теперь везде используется chat_id.
#
################################################################################

input_number:
  telegram_delay_ms:
    name: "Задержка PVE действий (сек)"
    min: 1
    max: 10
    step: 1
    initial: 5
    icon: mdi:timer-sand

input_boolean:
  telegram_bot_log_commands:
    name: "Логировать команды Telegram"
    initial: true
    icon: mdi:math-log

##############################################################################
#                                СКРИПТЫ
##############################################################################

script:
  # --------------------------------------------------------------------------
  # Универсальный переключатель устройств
  # --------------------------------------------------------------------------
  toggle_device:
    alias: "Общий скрипт для toggle устройства и обновления меню"
    fields:
      entity:
        description: "Entity ID для toggle"
        required: true
      domain:
        description: "Domain (light/switch/fan)"
        required: true
      menu_script:
        description: "Скрипт для отправки обновлённого меню"
        required: true
      message_id:
        description: "ID сообщения для удаления"
        required: true
      chat_id:
        description: "ID чата"
        required: true
      user_id:
        description: "ID пользователя"
        required: false
    sequence:
      # 1. Выполняем действие
      - service: >-
          {% if domain == 'climate' %}
            climate.turn_{{ 'on' if is_state(entity, 'off') else 'off' }}
          {% else %}
            {{ domain }}.toggle
          {% endif %}
        target:
          entity_id: "{{ entity }}"

      # 2. Удаляем старое сообщение (чтобы не было дублей)
      - service: telegram_bot.delete_message
        data:
          message_id: "{{ message_id }}"
          chat_id: "{{ chat_id }}"

      # 3. Отправляем обновленное меню
      - service: "{{ menu_script }}"
        data:
          chat_id: "{{ chat_id }}"

      # 4. Логируем (если включено)
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.telegram_bot_log_commands
                state: "on"
            sequence:
              - service: system_log.write
                data:
                  message: "TG: Toggle {{ entity }} by user: {{ user_id | default('unknown') }}"
                  level: info

  # --------------------------------------------------------------------------
  # PVE Action (Действие с задержкой и обновлением)
  # --------------------------------------------------------------------------
  pve_action:
    alias: "PVE Action with Delay"
    fields:
      button:
        required: true
      chat_id:
        required: true
      page:
        required: false
      delete_message_id:
        required: false
      delete_chat_id:
        required: false
      user_id:
        required: false
    sequence:
      - service: button.press
        target:
          entity_id: "{{ button }}"

      - delay:
          seconds: "{{ states('input_number.telegram_delay_ms') | int(5) }}"

      - service: script.send_pve_status_paged
        data:
          chat_id: "{{ chat_id }}"
          page: "{{ [3, [1, (page | default(1) | int(1))] | max] | min }}"
          delete_message_id: "{{ delete_message_id | default('') }}"
          delete_chat_id: "{{ delete_chat_id | default('') }}"

      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.telegram_bot_log_commands
                state: "on"
            sequence:
              - service: system_log.write
                data:
                  message: "TG: PVE Action {{ button }} by {{ user_id | default('unknown') }} on page {{ page | default(1) }}"
                  level: info
  # --------------------------------------------------------------------------
  # Генераторы меню (Send Status Scripts)
  # --------------------------------------------------------------------------
  send_main_menu:
    alias: "Send Main Menu"
    fields:
      chat_id:
        required: true
    sequence:
      - service: telegram_bot.send_message
        data:
          chat_id: "{{ chat_id }}"
          parse_mode: html
          message: |
            <b>💻 Выбрать комнату для управления :</b>
          inline_keyboard: >
            {{ [
                [ ["🏠 Гостиная", "/livingroom_control"], ["🍽 Кухня", "/kitchen_control"] ],
                [ ["🏢 Рабочий кабинет", "/workroom_control"], ["🛏 Спальня", "/bedroom_control"] ],
                [ ["🛁 Ванная", "/bathroom_control"], ["🚪 Коридор", "/hallway_control"] ],
                [ ["🖥 Система", "/system_control"] ]
              ] | tojson }}

  send_livingroom_status:
    alias: "Send Living Room Status"
    fields:
      chat_id:
        required: true
    sequence:
      - service: telegram_bot.send_message
        data:
          chat_id: "{{ chat_id }}"
          parse_mode: html
          message: |
            <b>🏠 Текущее состояние в гостиной:</b>
            🌡 <b>Температура:</b> {{ states('sensor.livingroom_climat_sensor_temperature') | default('N/A') }}°C
            💧 <b>Влажность:</b> {{ states('sensor.livingroom_climat_sensor_humidity') | default('N/A') }}%
            🌿 <b>CO₂:</b> {{ states('sensor.co2_monitor_co2') | default('N/A') }} ppm
            💨 <b>PM2.5:</b> {{ states('sensor.zhimi_mb3_a5d3_pm25') | default('N/A') }} µg/m³
            🚪 <b>Статус дверей:</b> {% if is_state('binary_sensor.gostinaia_balkon_contact','on') or is_state('binary_sensor.0x00158d0003ce9922_contact','on') %}Открыта{% else %}Закрыта{% endif %}
          inline_keyboard: >
            {{ [
                [ ["🔴 Люстра" if is_state("light.livingroom_main_switch_left", "off") else "🟢 Люстра", "/toggle_livingroom_main_switch_left"],
                  ["🔴 Свет над диваном" if is_state("light.livingroom_main_switch_right", "off") else "🟢 Свет над диваном", "/toggle_livingroom_main_switch_right"],
