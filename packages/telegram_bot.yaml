  # ==========================================================================
  # Подтверждение и перезагрузка
  # ==========================================================================
  - id: "telegram_bot_confirm_reboot"
    alias: "Telegram Bot Confirm Reboot"
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/confirm_reboot"
    actions:
      - service: telegram_bot.send_message
        data:
          target: "{{ trigger.event.data.chat_id }}"
          parse_mode: html
          message: "<b>⚠️ Подтвердите перезагрузку системы!</b>"
          inline_keyboard: >
            {{ [
                [ ["✅ Подтвердить", "/force_reboot"] ],
                [ ["❌ Отмена", "/system_control"] ]
              ] | tojson }}

  - id: "telegram_bot_force_reboot"
    alias: "Telegram Bot Force Reboot"
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/force_reboot"
    actions:
      - service: telegram_bot.send_message
        data:
          target: "{{ trigger.event.data.chat_id }}"
          parse_mode: html
          message: "<b>⚠️ Система будет перезагружена через 5 секунд!</b>"
      - delay:
          seconds: 5
      - service: homeassistant.restart
      - service: system_log.write
        data:
          message: "Система перезагружена через Telegram (user: {{ trigger.event.data.user_id }})"
          level: warning

  # ==========================================================================
  # Управление PVE (All-in-One Optimization)
  # ==========================================================================
  - id: "telegram_bot_pve_status_refresh"
    alias: "Telegram Bot PVE Status Refresh"
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/pve_status_refresh"
    actions:
      - service: telegram_bot.delete_message
        data:
          message_id: "{{ trigger.event.data.message.message_id }}"
          chat_id: "{{ trigger.event.data.chat_id }}"
      - service: script.send_pve_status
        data:
          target: "{{ trigger.event.data.chat_id }}"

  # --- МАГИЯ: Одна автоматизация вместо 24 ---
  - id: "telegram_bot_pve_unified_control"
    alias: "Telegram Bot PVE Unified Control"
    triggers:
      - platform: event
        event_type: telegram_callback
    condition:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      # Проверяем, что команда начинается со "/" и есть в нашем списке маппинга
      - condition: template
        value_template: >
          {% set cmd = trigger.event.data.data %}
          {% set map = {
            "/reboot_haos12": "button.qemu_haos12_3_100_reboot",
            "/reboot_chr": "button.qemu_mikrotik_routeros_chr_200_reboot",
            "/start_mariadb": "button.lxc_mariadb_101_start",
            "/stop_mariadb": "button.lxc_mariadb_101_stop",
            "/reboot_mariadb": "button.lxc_mariadb_101_reboot",
            "/start_jackett": "button.lxc_jackett_102_start",
            "/stop_jackett": "button.lxc_jackett_102_stop",
            "/reboot_jackett": "button.lxc_jackett_102_reboot",
            "/start_jellyfin": "button.lxc_jellyfin_103_start",
            "/stop_jellyfin": "button.lxc_jellyfin_103_stop",
            "/reboot_jellyfin": "button.lxc_jellyfin_103_reboot",
            "/start_deluge": "button.lxc_deluge_104_start",
            "/stop_deluge": "button.lxc_deluge_104_stop",
            "/reboot_deluge": "button.lxc_deluge_104_reboot",
            "/start_torrserver": "button.lxc_debian_105_start",
            "/stop_torrserver": "button.lxc_debian_105_stop",
            "/reboot_torrserver": "button.lxc_debian_105_reboot",
            "/start_minimserver": "button.lxc_minim_107_start",
            "/stop_minimserver": "button.lxc_minim_107_stop",
            "/reboot_minimserver": "button.lxc_minim_107_reboot",
            "/start_immich": "button.lxc_immich_106_start",
            "/stop_immich": "button.lxc_immich_106_stop",
            "/reboot_immich": "button.lxc_immich_106_reboot",
            "/start_photoview": "button.lxc_photoview_108_start",
            "/stop_photoview": "button.lxc_photoview_108_stop",
            "/reboot_photoview": "button.lxc_photoview_108_reboot",
            "/start_npmplus": "button.lxc_npmplus_109_start",
            "/stop_npmplus": "button.lxc_npmplus_109_stop",
            "/reboot_npmplus": "button.lxc_npmplus_109_reboot",
            "/start_vaultwarden": "button.lxc_alpine_vaultwarden_110_start",
            "/stop_vaultwarden": "button.lxc_alpine_vaultwarden_110_stop",
            "/reboot_vaultwarden": "button.lxc_alpine_vaultwarden_110_reboot",
            "/start_pihole": "button.lxc_pihole_111_start",
            "/stop_pihole": "button.lxc_pihole_111_stop",
            "/reboot_pihole": "button.lxc_pihole_111_reboot"
          } %}
          {{ cmd in map }}
    actions:
      - service: script.pve_action
        data:
          # Динамически берем entity_id кнопки из маппинга
          button: >
            {% set cmd = trigger.event.data.data %}
            {% set map = {
              "/reboot_haos12": "button.qemu_haos12_3_100_reboot",
              "/reboot_chr": "button.qemu_mikrotik_routeros_chr_200_reboot",
              "/start_mariadb": "button.lxc_mariadb_101_start",
              "/stop_mariadb": "button.lxc_mariadb_101_stop",
              "/reboot_mariadb": "button.lxc_mariadb_101_reboot",
              "/start_jackett": "button.lxc_jackett_102_start",
              "/stop_jackett": "button.lxc_jackett_102_stop",
              "/reboot_jackett": "button.lxc_jackett_102_reboot",
              "/start_jellyfin": "button.lxc_jellyfin_103_start",
              "/stop_jellyfin": "button.lxc_jellyfin_103_stop",
              "/reboot_jellyfin": "button.lxc_jellyfin_103_reboot",
              "/start_deluge": "button.lxc_deluge_104_start",
              "/stop_deluge": "button.lxc_deluge_104_stop",
              "/reboot_deluge": "button.lxc_deluge_104_reboot",
              "/start_torrserver": "button.lxc_debian_105_start",
              "/stop_torrserver": "button.lxc_debian_105_stop",
              "/reboot_torrserver": "button.lxc_debian_105_reboot",
              "/start_minimserver": "button.lxc_minim_107_start",
              "/stop_minimserver": "button.lxc_minim_107_stop",
              "/reboot_minimserver": "button.lxc_minim_107_reboot",
              "/start_immich": "button.lxc_immich_106_start",
              "/stop_immich": "button.lxc_immich_106_stop",
              "/reboot_immich": "button.lxc_immich_106_reboot",
              "/start_photoview": "button.lxc_photoview_108_start",
              "/stop_photoview": "button.lxc_photoview_108_stop",
              "/reboot_photoview": "button.lxc_photoview_108_reboot",
              "/start_npmplus": "button.lxc_npmplus_109_start",
              "/stop_npmplus": "button.lxc_npmplus_109_stop",
              "/reboot_npmplus": "button.lxc_npmplus_109_reboot",
              "/start_vaultwarden": "button.lxc_alpine_vaultwarden_110_start",
              "/stop_vaultwarden": "button.lxc_alpine_vaultwarden_110_stop",
              "/reboot_vaultwarden": "button.lxc_alpine_vaultwarden_110_reboot",
              "/start_pihole": "button.lxc_pihole_111_start",
              "/stop_pihole": "button.lxc_pihole_111_stop",
              "/reboot_pihole": "button.lxc_pihole_111_reboot"
            } %}
            {{ map[cmd] }}
          chat_id: "{{ trigger.event.data.chat_id }}"
          user_id: "{{ trigger.event.data.user_id }}"
