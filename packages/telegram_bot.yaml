    condition:
      - condition: template
        value_template: >
          {% set d = trigger.event.data.data | default('') %}
          {{ d.startswith('/pve_status_refresh') }}
    actions:
      - variables:
          d: "{{ trigger.event.data.data | default('') }}"
          page: >
            {% set p = (d.split('p=')[-1] | int(1)) %}
            {{ 1 if p < 1 else (3 if p > 3 else p) }}
      - service: script.send_pve_status_paged
        data:
          chat_id: "{{ trigger.event.data.chat_id }}"
          page: "{{ page }}"
          delete_message_id: "{{ trigger.event.data.message.message_id }}"
          delete_chat_id: "{{ trigger.event.data.chat_id }}"

