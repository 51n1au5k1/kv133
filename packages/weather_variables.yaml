################################################################################
# /packages/weather_variables.yaml
################################################################################
#
# Назначение:
#   В данном пакете собраны и вычисляемые сенсоры
#   (template), используемые в различных частях системы умного дома.
#   Например, здесь определяются:
#   1) Погодные переводы (направления ветра, погода) как для OpenWeather
#      (open_meteo_*) так и для Яндекс (yandex_weather4notion_*).
#
################################################################################

##############################################################################
#                             TEMPLATE SENSORS
##############################################################################
template:
  # ==================================================================
  # 1) Перевод состояний погоды Open Meteo (weather.kvartira_133)
  # ==================================================================
  - sensor:
      - unique_id: open_meteo_weather4notion_wind
        name: "Направление ветра (OpenWeather)"
        icon: mdi:windsock
        availability: >
          {{ state_attr('weather.kvartira_133', 'wind_bearing') is not none }}
        state: >
          {% set bearing = state_attr('weather.kvartira_133', 'wind_bearing') | float(0) %}
          {% set directions = [
            'северный',
            'северо-восточный',
            'восточный',
            'юго-восточный',
            'южный',
            'юго-западный',
            'западный',
            'северо-западный'
          ] %}
          {% set index = ((bearing + 22.5) // 45) | int % 8 %}
          {{ directions[index] }}

      - unique_id: open_meteo_opisanie_na_russkom
        name: "Погодные условия (OpenWeather, рус.)"
        icon: mdi:weather-partly-cloudy
        availability: >
          {{ states('weather.kvartira_133') not in ['unknown', 'unavailable', ''] }}
        state: >
          {% set condition = states('weather.kvartira_133') %}
          {% set condition_map = dict(
            sunny='ясно',
            partlycloudy='малооблачно',
            cloudy='облачно с прояснениями',
            overcast='пасмурно',
            fog='туман',
            drizzle='морось',
            rainy='дождливо',
            lightning_rainy='гроза с дождём',
            snowy_rainy='дождь со снегом',
            exceptional='аномальные погодные условия',
            lightning='гроза',
            pouring='ливень',
            snowy='снег'
          ) %}
          {{ condition_map.get(condition, 'неопределенные погодные условия') }}
