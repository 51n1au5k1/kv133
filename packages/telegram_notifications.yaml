################################################################################
# /packages/telegram_notifications.yaml
################################################################################

input_text:
  weather_primary_entity:
    name: "Погода: основной провайдер"
    initial: "weather.yandex_pogoda"
    min: 0
    max: 80
    icon: mdi:weather-partly-cloudy

  weather_fallback_entity:
    name: "Погода: резервный провайдер"
    initial: "weather.kvartira_133"
    min: 0
    max: 80
    icon: mdi:weather-partly-cloudy

script:
  telegram_send_weather_forecast:
    description: "Формирует и отправляет прогноз погоды указанному получателю"
    fields:
      recipient:
        description: "Сущность notify.* (например, notify.telegram_master)"
        example: "notify.telegram_master"
        required: true
    sequence:
      - variables:
          primary_weather_entity: "{{ states('input_text.weather_primary_entity') | trim }}"
          fallback_weather_entity: "{{ states('input_text.weather_fallback_entity') | trim }}"
          weather_entity: >-
            {% set primary = states('input_text.weather_primary_entity') | trim %}
            {% set fallback = states('input_text.weather_fallback_entity') | trim %}
            {% if primary and states(primary) not in ['unknown', 'unavailable', 'none', ''] %}
              {{ primary }}
            {% else %}
              {{ fallback }}
            {% endif %}

      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: "{{ weather_entity }}"
        response_variable: weather_forecast

      - variables:
          today_date: "{{ now().strftime('%d.%m.%Y') }}"
          title: "<b>Прогноз погоды на <u>{{ today_date }}</u></b>"

          # Текущие данные
          current_condition: >-
            {% set ya_condition = state_attr(weather_entity, 'yandex_condition') %}
            {% set cond = ya_condition | lower if ya_condition else states(weather_entity) %}
            {% set condition_map = dict(
              sunny='ясно',
              clear_night='ясно',
              partlycloudy='малооблачно',
              cloudy='облачно',
              overcast='пасмурно',
              fog='туман',
              drizzle='морось',
              rainy='дождливо',
              rain='дождливо',
              pouring='ливень',
              lightning='гроза',
              lightning_rainy='гроза с дождём',
              snowy='снег',
              snowy_rainy='дождь со снегом',
              hail='град',
              clear='ясно',
              partly_cloudy='малооблачно',
              light_rain='небольшой дождь',
              heavy_rain='сильный дождь',
              showers='ливень',
              sleet='дождь со снегом',
              light_snow='небольшой снег',
              snow='снег',
              snowfall='снегопад',
              thunderstorm='гроза',
              thunderstorm_with_rain='гроза с дождём',
              thunderstorm_with_hail='гроза с градом'
            ) %}
            {{ condition_map.get(cond | replace('-', '_'), cond) }}
          current_temperature: "{{ state_attr(weather_entity, 'temperature') | default('N/A') }}"
          current_wind_bearing: "{{ state_attr(weather_entity, 'wind_bearing') | default(0) }}"
          current_wind_speed: "{{ state_attr(weather_entity, 'wind_speed') | default('N/A') }}"
          current_pressure_mmhg: "{{ state_attr(weather_entity, 'pressure') | default(0) }}"

          # Направление ветра
          wind_direction: >-
            {% set bearing = current_wind_bearing | int %}
            {% if bearing >= 337.5 or bearing < 22.5 %}северный
            {% elif bearing >= 22.5 and bearing < 67.5 %}северо-восточный
            {% elif bearing >= 67.5 and bearing < 112.5 %}восточный
            {% elif bearing >= 112.5 and bearing < 157.5 %}юго-восточный
            {% elif bearing >= 157.5 and bearing < 202.5 %}южный
            {% elif bearing >= 202.5 and bearing < 247.5 %}юго-западный
            {% elif bearing >= 247.5 and bearing < 292.5 %}западный
            {% elif bearing >= 292.5 and bearing < 337.5 %}северо-западный
            {% else %}неизвестно{% endif %}

          # Давление
          current_pressure: >-
            {% set sensor_pressure = states('sensor.livingroom_corrected_pressure') | float(0) %}
            {% if sensor_pressure > 0 %}
              {{ sensor_pressure | round(1) }}
            {% elif current_pressure_mmhg > 0 %}
              {{ current_pressure_mmhg | round(1) }}
            {% else %}
              735
            {% endif %}

          # Иконка
          weather_icon: >-
            {% set cond = states(weather_entity) %}
            {% if cond == 'sunny' or current_condition == 'ясно' %}☀️
            {% elif cond == 'clear-night' %}🌙
            {% elif cond == 'partlycloudy' or current_condition == 'малооблачно' %}⛅
            {% elif cond == 'cloudy' or current_condition in ['облачно с прояснениями', 'облачно'] %}☁️
            {% elif cond == 'overcast' or current_condition == 'пасмурно' %}🌥
            {% elif cond == 'fog' or current_condition == 'туман' %}🌫
            {% elif cond in ['drizzle','light-rain'] or current_condition in ['морось', 'небольшой дождь'] %}🌦
            {% elif cond in ['rainy','rain'] or current_condition == 'дождливо' %}🌧
            {% elif cond == 'pouring' or current_condition == 'ливень' %}⛈
            {% elif cond == 'snowy' or current_condition == 'снег' %}❄️
            {% elif cond == 'snowy-heavy' or current_condition == 'сильный снег' %}🌨
            {% elif cond == 'sleet' or current_condition == 'дождь со снегом' %}🌧❄️
            {% elif cond == 'lightning' or current_condition == 'гроза' %}⚡
            {% else %}🌈{% endif %}

      - action: notify.send_message
        target:
          entity_id: "{{ recipient }}"
        data:
          title: "{{ title }}"
          message: >-
            {{ weather_icon }} <b>Сейчас:</b> {{ current_condition }}

            🌡 <b>Температура:</b> {{ current_temperature }}°C
            🌬 <b>Ветер:</b> {{ wind_direction }}, {{ current_wind_speed }} м/с

            <b>📅 Прогноз на сегодня:</b>
            {%- if weather_forecast is defined and weather_forecast[weather_entity] is defined and weather_forecast[weather_entity]['forecast'] is defined %}
            {%- set forecasts = weather_forecast[weather_entity]['forecast'] %}
            {%- set today_items = namespace(found=false) %}
            {%- for forecast in forecasts[:8] %}
            {%- if forecast.datetime is defined %}
            {%- set forecast_dt = forecast.datetime | as_datetime | as_local %}
            {%- if forecast_dt is not none and forecast_dt.date() == now().date() and forecast_dt > now() %}
            {%- set today_items.found = true %}
            {%- set cond = forecast.condition | default('unknown') %}
            {%- set icon = '☀️' if cond == 'sunny' else '⛅' if cond == 'partlycloudy' else '☁️' if cond == 'cloudy' else '🌥' if cond == 'overcast' else '🌫' if cond == 'fog' else '🌦' if cond in ['drizzle','light-rain'] else '🌧' if cond in ['rainy','rain'] else '⛈' if cond == 'pouring' else '❄️' if cond == 'snowy' else '🌨' if cond == 'snowy-heavy' else '🌧❄️' if cond == 'sleet' else '⚡' if cond == 'lightning' else '🌈' %}
            • <b>{{ forecast_dt.strftime('%H:%M') }}</b> {{ icon }} {{ forecast.temperature | round(1) }}°C
            {%- set precip = forecast.precipitation | float(0) if forecast.precipitation is defined else 0 -%}
            {%- if precip > 0 %}, осадки: {{ precip }} мм{% endif -%}
            {%- endif -%}
            {%- endif -%}
            {%- endfor %}
            {%- if not today_items.found %}
            ℹ️ Прогноз на оставшуюся часть дня недоступен
            {%- endif -%}
            {%- else %}
            ⚠️ Прогноз недоступен
            {%- endif %}

            <b>💨 Давление:</b> {{ current_pressure }} мм рт. ст.
            (<i>{% if current_pressure > 740 %}⬆️ выше{% elif current_pressure < 738 %}⬇️ ниже{% else %}🟢 норма{% endif %}</i>)

automation:
  # --- ПОГОДА ---
  - id: "ac0837cf-9ecb-413b-96fb-89552934212d"
    alias: "Уведомление. Телеграм: Прогноз погоды"
    mode: single
    triggers:
      - trigger: time
        at: "07:45:00"
    actions:
      - action: script.telegram_send_weather_forecast
        data:
          recipient: notify.telegram_master

  # --- БЕЗОПАСНОСТЬ: ВХОДНАЯ ДВЕРЬ ---
  - id: "1f7e3ae4-268e-4afa-a7e6-d395821f244b"
    alias: "Уведомление. Телеграм: Открытие входной двери"
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.hallway_door_contact
        to: "on"
    conditions:
      - condition: state
        entity_id: binary_sensor.resident_is_home
        state: "off"
      - condition: state
        entity_id: input_boolean.bathroom_cleaning_mode
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "⚠️ <b>Открытие входной двери!</b> 🔓"

  # --- СИСТЕМА: СТАРТ/СТОП ---
  - id: "686a3440-7629-4b55-b508-593caf3679af"
    alias: "Уведомление. Телеграм: Сервер запущен"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "🚀 Home Assistant запущен!"

  - id: "c8dc47aa-90f0-4522-b71e-4e99bbfe6c76"
    alias: "Уведомление. Телеграм: Сервер отключён"
    mode: single
    triggers:
      - trigger: homeassistant
        event: shutdown
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "🛑 Home Assistant выключается..."

  # --- СИСТЕМА: ОБНОВЛЕНИЯ HA ---
  - id: "4c5c8e57-be5b-4380-88a1-4ecc730c19da"
    alias: "Уведомление. Телеграм: Обновления компонентов"
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - update.home_assistant_core_update
          - update.home_assistant_google_drive_backup_update
          - update.home_assistant_operating_system_update
          - update.home_assistant_supervisor_update
          - update.studio_code_server_update
        to: "on"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            {% set entity = trigger.to_state %}
            {% if entity %}
              🆕 <b>Обновление доступно:</b> {{ entity.attributes.friendly_name }}
              v{{ entity.attributes.installed_version }} ➡️ v{{ entity.attributes.latest_version }}
            {% endif %}

  # ----------------------------------------------------------------------------
  # Уведомление: Проблемы с жесткими дисками Proxmox (S.M.A.R.T)
  # ----------------------------------------------------------------------------
  - id: "daa17acf-7c8a-4a8e-9fd0-4f2c5348c814"
    alias: "Уведомление. Телеграм: Proxmox Диски (S.M.A.R.T)"
    description: "Срабатывает, если device_class: problem переходит в ON"
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.disk_pve_netac_nvme_ssd_500gb_health
          - binary_sensor.disk_pve_wdc_wd80efpx_68c4zn0_health
          # Если появятся дубликаты _2, _3, можно добавить их сюда,
          # но обычно достаточно основного сенсора
        to: "on"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            🔴 <b>Proxmox: Ошибка диска (S.M.A.R.T)!</b>
            Диск: {{ trigger.to_state.attributes.friendly_name | default('Неизвестный диск') }}
            Статус: FAILURE/PROBLEM

  # ----------------------------------------------------------------------------
  # Уведомление: Проблемы с ZFS пулом (НОВОЕ)
  # ----------------------------------------------------------------------------
  - id: "proxmox_zfs_health_alert"
    alias: "Уведомление. Телеграм: Proxmox ZFS Pool Alert"
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.zfs_pve_zfs_pool_datapool_health
        from: "ONLINE"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      # Игнорируем недоступность сенсора, реагируем только на DEGRADED/FAULTED
      - condition: template
        value_template: "{{ trigger.to_state.state not in ['unavailable', 'unknown', ''] }}"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            ☠️ <b>Proxmox: Проблема с ZFS пулом!</b>
            Пул: <b>datapool</b>
            Статус: <b>{{ trigger.to_state.state }}</b> (был ONLINE)
            Срочно проверьте состояние дисков!

  # ----------------------------------------------------------------------------
  # Уведомление: Доступны обновления для Proxmox
  # ----------------------------------------------------------------------------
  - id: "ab5c1bd2-8756-4736-9909-52766bf989bd"
    alias: "Уведомление. Телеграм: Доступны обновления для Proxmox"
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.node_pve_updates_packages
        to: "on"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            🔄 <b>Доступны обновления для Proxmox!</b>
            Количество пакетов: {{ states('sensor.node_pve_total_updates') | default('N/A') }}.
            Рекомендуется обновить систему.

  # --- СЕЙФ (Уведомления) ---
  - id: "666e2076-ea49-4c53-85de-ef23566b5d00"
    alias: "Уведомление. Телеграм: Сейф — риск плесени"
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.strongbox_hum_text_notified
        to: "on"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - variables:
          rh: "{{ states('sensor.strongbox_th_humidity') | float(0) | round(1) }}"
          t: "{{ states('sensor.strongbox_th_temperature') | float(0) | round(1) }}"
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "⚠️ <b>Сейф: риск плесени!</b> (RH: {{ rh }}%, T: {{ t }}°C)"

  - id: "cba8ab8b-5849-423a-bc56-6c04bfb51699"
    alias: "Уведомление. Телеграм: Сейф — норма"
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.strongbox_hum_text_notified
        to: "off"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "✅ <b>Сейф: условия в норме.</b>"

  # ----------------------------------------------------------------------------
  # Уведомление: Остановка критически важных аддонов/сервисов
  # ----------------------------------------------------------------------------
  - id: "notify_service_stopped"
    alias: "Уведомление. Телеграм: Остановка системного сервиса"
    mode: parallel
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.home_assistant_google_drive_backup_running
          - binary_sensor.matter_server_running
          - binary_sensor.studio_code_server_running
        from: "on"
        to: "off"
        for: "00:00:30" # Защита от ложных срабатываний при обновлении/рестарте аддона
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            🔴 <b>Внимание! Сервис остановлен</b>

            Сервис: <b>{{ trigger.to_state.attributes.friendly_name | replace(' Работает', '') }}</b>
            Статус: ❌ Не работает
