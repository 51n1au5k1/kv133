################################################################################
# /packages/telegram_notifications.yaml
################################################################################

script:
  telegram_send_weather_forecast:
    description: "Формирует и отправляет прогноз погоды указанному получателю"
    fields:
      recipient:
        description: "Сущность notify.* (например, notify.telegram_master)"
        example: "notify.telegram_master"
        required: true
    sequence:
      - service: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: weather.kvartira_133
        response_variable: weather_forecast

      - variables:
          today_date: "{{ now().strftime('%d.%m.%Y') }}"
          title: "<b>Прогноз погоды на <u>{{ today_date }}</u></b>"

          # Текущие данные
          current_condition: "{{ states('sensor.open_meteo_opisanie_na_russkom') | default(states('weather.kvartira_133'), true) }}"
          current_temperature: "{{ state_attr('weather.kvartira_133', 'temperature') | default('N/A') }}"
          current_wind_bearing: "{{ state_attr('weather.kvartira_133', 'wind_bearing') | default(0) }}"
          current_wind_speed: "{{ state_attr('weather.kvartira_133', 'wind_speed') | default('N/A') }}"
          current_pressure_mmhg: "{{ state_attr('weather.kvartira_133', 'pressure') | default(0) }}"

          # Направление ветра
          wind_direction: >-
            {% set bearing = current_wind_bearing | int %}
            {% if bearing >= 337.5 or bearing < 22.5 %}северный
            {% elif bearing >= 22.5 and bearing < 67.5 %}северо-восточный
            {% elif bearing >= 67.5 and bearing < 112.5 %}восточный
            {% elif bearing >= 112.5 and bearing < 157.5 %}юго-восточный
            {% elif bearing >= 157.5 and bearing < 202.5 %}южный
            {% elif bearing >= 202.5 and bearing < 247.5 %}юго-западный
            {% elif bearing >= 247.5 and bearing < 292.5 %}западный
            {% elif bearing >= 292.5 and bearing < 337.5 %}северо-западный
            {% else %}неизвестно{% endif %}

          # Давление
          current_pressure: >-
            {% set sensor_pressure = states('sensor.livingroom_corrected_pressure') | float(0) %}
            {% if sensor_pressure > 0 %}
              {{ sensor_pressure | round(1) }}
            {% elif current_pressure_mmhg > 0 %}
              {{ current_pressure_mmhg | round(1) }}
            {% else %}
              735
            {% endif %}

          # Иконка
          weather_icon: >-
            {% set cond = states('weather.kvartira_133') %}
            {% if cond == 'sunny' or current_condition == 'ясно' %}☀️
            {% elif cond == 'partlycloudy' or current_condition == 'малооблачно' %}⛅
            {% elif cond == 'cloudy' or current_condition in ['облачно с прояснениями', 'облачно'] %}☁️
            {% elif cond == 'overcast' or current_condition == 'пасмурно' %}🌥
            {% elif cond == 'fog' or current_condition == 'туман' %}🌫
            {% elif cond in ['drizzle','light-rain'] or current_condition in ['морось', 'небольшой дождь'] %}🌦
            {% elif cond in ['rainy','rain'] or current_condition == 'дождливо' %}🌧
            {% elif cond == 'pouring' or current_condition == 'ливень' %}⛈
            {% elif cond == 'snowy' or current_condition == 'снег' %}❄️
            {% elif cond == 'snowy-heavy' or current_condition == 'сильный снег' %}🌨
            {% elif cond == 'sleet' or current_condition == 'дождь со снегом' %}🌧❄️
            {% elif cond == 'lightning' or current_condition == 'гроза' %}⚡
            {% else %}🌈{% endif %}

      - action: notify.send_message
        target:
          entity_id: "{{ recipient }}"
        data:
          title: "{{ title }}"
          message: >-
            {{ weather_icon }} <b>Сейчас:</b> {{ current_condition }}

            🌡 <b>Температура:</b> {{ current_temperature }}°C
            🌬 <b>Ветер:</b> {{ wind_direction }}, {{ current_wind_speed }} м/с

            <b>📅 Прогноз на сегодня:</b>
            {%- if weather_forecast is defined and weather_forecast['weather.kvartira_133'] is defined and weather_forecast['weather.kvartira_133']['forecast'] is defined %}
            {%- set forecasts = weather_forecast['weather.kvartira_133']['forecast'] %}
            {%- set today_items = namespace(found=false) %}
            {%- for forecast in forecasts[:8] %}
            {%- if forecast.datetime is defined %}
            {%- set forecast_dt = forecast.datetime | as_datetime | as_local %}
            {%- if forecast_dt is not none and forecast_dt.date() == now().date() and forecast_dt > now() %}
            {%- set today_items.found = true %}
            {%- set cond = forecast.condition | default('unknown') %}
            {%- set icon = '☀️' if cond == 'sunny' else '⛅' if cond == 'partlycloudy' else '☁️' if cond == 'cloudy' else '🌥' if cond == 'overcast' else '🌫' if cond == 'fog' else '🌦' if cond in ['drizzle','light-rain'] else '🌧' if cond in ['rainy','rain'] else '⛈' if cond == 'pouring' else '❄️' if cond == 'snowy' else '🌨' if cond == 'snowy-heavy' else '🌧❄️' if cond == 'sleet' else '⚡' if cond == 'lightning' else '🌈' %}
            • <b>{{ forecast_dt.strftime('%H:%M') }}</b> {{ icon }} {{ forecast.temperature | round(1) }}°C
            {%- set precip = forecast.precipitation | float(0) if forecast.precipitation is defined else 0 -%}
            {%- if precip > 0 %}, осадки: {{ precip }} мм{% endif -%}
            {%- endif -%}
            {%- endif -%}
            {%- endfor %}
            {%- if not today_items.found %}
            ℹ️ Прогноз на оставшуюся часть дня недоступен
            {%- endif -%}
            {%- else %}
            ⚠️ Прогноз недоступен
            {%- endif %}

            <b>💨 Давление:</b> {{ current_pressure }} мм рт. ст.
            (<i>{% if current_pressure > 740 %}⬆️ выше{% elif current_pressure < 738 %}⬇️ ниже{% else %}🟢 норма{% endif %}</i>)

automation:
  # --- ПОГОДА ---
  - id: "ac0837cf-9ecb-413b-96fb-89552934212d"
    alias: "Уведомление. Телеграм: Прогноз погоды"
    mode: single
    triggers:
      - trigger: time
        at: "07:45:00"
    actions:
      - action: script.telegram_send_weather_forecast
        data:
          recipient: notify.telegram_master

  # --- БЕЗОПАСНОСТЬ: ВХОДНАЯ ДВЕРЬ ---
  - id: "1f7e3ae4-268e-4afa-a7e6-d395821f244b"
    alias: "Уведомление. Телеграм: Открытие входной двери"
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.hallway_door_contact
        to: "on"
    conditions:
      - condition: state
        entity_id: person.master
        state: "not_home"
      - condition: state
        entity_id: input_boolean.bathroom_cleaning_mode
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "⚠️ <b>Открытие входной двери!</b> 🔓"

  # --- БЕЗОПАСНОСТЬ: ЗВОНОК В ДВЕРЬ ---
  - id: "eaddf6dd-762d-487e-9bf2-ba018f10b742"
    alias: "Уведомление. Телеграм: Уведомление о звонке в дверь"
    mode: single
    triggers:
      - trigger: device
        domain: mqtt
        device_id: d2c3001cdc59660c456de45aec09da91
        type: action
        subtype: single
      # Для event entity лучше ловить любое изменение состояния (обновление timestamp)
      - trigger: state
        entity_id: event.madv_cn_329651133_miowlv2l_doorbell_ring_e_2_1
    conditions:
      - condition: state
        entity_id: person.master
        state: "not_home"
      - condition: state
        entity_id: input_boolean.bathroom_cleaning_mode
        state: "off"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.doorbell_spam_guard
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "⚠️ <b>Кто-то звонит в дверь</b>"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.doorbell_spam_guard
      - delay: "00:00:30"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.doorbell_spam_guard

  # --- СИСТЕМА: СТАРТ/СТОП ---
  - id: "686a3440-7629-4b55-b508-593caf3679af"
    alias: "Уведомление. Телеграм: Сервер запущен"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "🚀 Home Assistant запущен!"

  - id: "c8dc47aa-90f0-4522-b71e-4e99bbfe6c76"
    alias: "Уведомление. Телеграм: Сервер отключён"
    mode: single
    triggers:
      - trigger: homeassistant
        event: shutdown
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "🛑 Home Assistant выключается..."

  # --- СИСТЕМА: ОБНОВЛЕНИЯ HA ---
  - id: "4c5c8e57-be5b-4380-88a1-4ecc730c19da"
    alias: "Уведомление. Телеграм: Обновления компонентов"
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - update.file_editor_update
          - update.home_assistant_core_update
          - update.home_assistant_google_drive_backup_update
          - update.home_assistant_operating_system_update
          - update.home_assistant_supervisor_update
          - update.log_viewer_update
          - update.mosquitto_broker_update
          - update.studio_code_server_update
          - update.zigbee2mqtt_update
          - update.ps5_mqtt_update
        to: "on"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            {% set entity = trigger.to_state %}
            {% if entity %}
              🆕 <b>Обновление доступно:</b> {{ entity.attributes.friendly_name }}
              v{{ entity.attributes.installed_version }} ➡️ v{{ entity.attributes.latest_version }}
            {% endif %}

  # --- БАТАРЕЙКИ ---
  - id: "ab45665b-4995-448d-b180-c0e1d77184e9"
    alias: "Уведомление. Телеграм: Массажёр (батарея)"
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.soocare_cn_1083009681_m14_battery_level_p_3_1
        below: 30
    conditions:
      - condition: state
        entity_id: person.master
        state: "home"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "🔋 <b>Массажёр разряжен (&lt;30%)</b>"

  # ----------------------------------------------------------------------------
  # Уведомление: Проблемы с жесткими дисками Proxmox (S.M.A.R.T)
  # ----------------------------------------------------------------------------
  - id: "daa17acf-7c8a-4a8e-9fd0-4f2c5348c814"
    alias: "Уведомление. Телеграм: Proxmox Диски (S.M.A.R.T)"
    description: "Срабатывает, если device_class: problem переходит в ON"
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.disk_pve_netac_nvme_ssd_500gb_health
          - binary_sensor.disk_pve_wdc_wd80efpx_68c4zn0_health
          # Если появятся дубликаты _2, _3, можно добавить их сюда,
          # но обычно достаточно основного сенсора
        to: "on"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            🔴 <b>Proxmox: Ошибка диска (S.M.A.R.T)!</b>
            Диск: {{ trigger.to_state.attributes.friendly_name | default('Неизвестный диск') }}
            Статус: FAILURE/PROBLEM

  # ----------------------------------------------------------------------------
  # Уведомление: Проблемы с ZFS пулом (НОВОЕ)
  # ----------------------------------------------------------------------------
  - id: "proxmox_zfs_health_alert"
    alias: "Уведомление. Телеграм: Proxmox ZFS Pool Alert"
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.zfs_pve_zfs_pool_datapool_health
        from: "ONLINE"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      # Игнорируем недоступность сенсора, реагируем только на DEGRADED/FAULTED
      - condition: template
        value_template: "{{ trigger.to_state.state not in ['unavailable', 'unknown', ''] }}"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            ☠️ <b>Proxmox: Проблема с ZFS пулом!</b>
            Пул: <b>datapool</b>
            Статус: <b>{{ trigger.to_state.state }}</b> (был ONLINE)
            Срочно проверьте состояние дисков!

  # ----------------------------------------------------------------------------
  # Уведомление: Заканчивается место на дисках/хранилищах
  # ----------------------------------------------------------------------------
  - id: "4751a90b-0134-4906-84f0-e5b1a7cb02c2"
    alias: "Уведомление. Телеграм: Proxmox Место на диске"
    mode: single
    triggers:
      # Основной диск ноды
      - trigger: numeric_state
        entity_id: sensor.node_pve_disk_used_percentage
        above: 90
        id: "root"
      # Хранилище ZFS (datapool)
      - trigger: numeric_state
        entity_id: sensor.storage_pve_datapool_disk_used_percentage
        above: 90
        id: "datapool"
      # Локальное хранилище (local)
      - trigger: numeric_state
        entity_id: sensor.storage_pve_local_disk_used_percentage
        above: 90
        id: "local"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            💾 <b>Proxmox: Мало места (>90%)!</b>
            {% if trigger.id == 'root' %}
            Системный диск (Root): <b>{{ states('sensor.node_pve_disk_used_percentage') }}%</b> занято.
            {% elif trigger.id == 'datapool' %}
            ZFS Datapool: <b>{{ states('sensor.storage_pve_datapool_disk_used_percentage') }}%</b> занято.
            {% elif trigger.id == 'local' %}
            Local Storage: <b>{{ states('sensor.storage_pve_local_disk_used_percentage') }}%</b> занято.
            {% endif %}

  # ----------------------------------------------------------------------------
  # Уведомление: Высокая нагрузка на ресурсы (CPU/RAM)
  # ----------------------------------------------------------------------------
  - id: "proxmox_high_load_alert"
    alias: "Уведомление. Телеграм: Proxmox Высокая нагрузка"
    mode: single
    triggers:
      # CPU > 90% в течение 10 минут
      - trigger: numeric_state
        entity_id: sensor.node_pve_cpu_used
        above: 90
        for: "00:10:00"
        id: cpu
      # RAM > 90% в течение 10 минут
      - trigger: numeric_state
        entity_id: sensor.node_pve_memory_used_percentage
        above: 90
        for: "00:10:00"
        id: ram
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            🔥 <b>Proxmox: Высокая нагрузка!</b>
            {% if trigger.id == 'cpu' %}
            CPU загружен на <b>{{ states('sensor.node_pve_cpu_used') | round(1) }}%</b> более 10 минут.
            {% elif trigger.id == 'ram' %}
            RAM занята на <b>{{ states('sensor.node_pve_memory_used_percentage') | round(1) }}%</b> более 10 минут.
            {% endif %}

  # ----------------------------------------------------------------------------
  # Уведомление: Доступны обновления для Proxmox
  # ----------------------------------------------------------------------------
  - id: "ab5c1bd2-8756-4736-9909-52766bf989bd"
    alias: "Уведомление. Телеграм: Доступны обновления для Proxmox"
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.node_pve_updates_packages
        to: "on"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: >
            🔄 <b>Доступны обновления для Proxmox!</b>
            Количество пакетов: {{ states('sensor.node_pve_total_updates') | default('N/A') }}.
            Рекомендуется обновить систему.

  # --- СЕЙФ (Уведомления) ---
  - id: "666e2076-ea49-4c53-85de-ef23566b5d00"
    alias: "Уведомление. Телеграм: Сейф — риск плесени"
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.strongbox_hum_text_notified
        to: "on"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - variables:
          rh: "{{ states('sensor.strongbox_th_humidity') | float(0) | round(1) }}"
          t: "{{ states('sensor.strongbox_th_temperature') | float(0) | round(1) }}"
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "⚠️ <b>Сейф: риск плесени!</b> (RH: {{ rh }}%, T: {{ t }}°C)"

  - id: "cba8ab8b-5849-423a-bc56-6c04bfb51699"
    alias: "Уведомление. Телеграм: Сейф — норма"
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.strongbox_hum_text_notified
        to: "off"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "✅ <b>Сейф: условия в норме.</b>"

  # --- ФИЛЬТРЫ: ОЧИСТИТЕЛЬ ВОЗДУХА ---
  - id: "d3bb27a3-51be-4ce6-8dc7-ebad482e5ea3"
    alias: "Телеграм: Очиститель — Замените фильтр"
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.zhimi_cn_271517251_mb3_filter_life_level_p_4_3
        below: 10
        for: "00:01:00"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.air_filter_replace_notified
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "⚠️ <b>Очиститель воздуха:</b> фильтр &lt; 10%!"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.air_filter_replace_notified

  # --- ФИЛЬТРЫ: УВЛАЖНИТЕЛЬ ---
  - id: "dbaaf929-4f15-4b23-8d4b-b8edd4083484"
    alias: "Телеграм: Увлажнитель — Замените фильтр"
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.xiaomi_cn_823407205_p3_filter_life_level_p_8_1
        below: 10
        for: "00:01:00"
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.humidifier_filter_replace_notified
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "⚠️ <b>Увлажнитель:</b> фильтр &lt; 10%!"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.humidifier_filter_replace_notified

  # --- ВОДА: УВЛАЖНИТЕЛЬ ---
  - id: "68eb40de-2339-4260-9bd6-3db5aa1604d9"
    alias: "Телеграм: Увлажнитель — Нет воды"
    mode: single
    triggers:
      # Ловим событие (для Xiaomi Miot Auto это изменение атрибута или состояния event entity)
      - trigger: state
        entity_id: event.xiaomi_cn_823407205_p3_low_water_level_e_2_1
    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.humidifier_low_water_notified
        state: "off"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "💧 <b>Увлажнитель:</b> закончилась вода!"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.humidifier_low_water_notified
