################################################################################
# /packages/helper_main.yaml
################################################################################
#
# ГЛОБАЛЬНЫЕ ХЕЛПЕРЫ СИСТЕМЫ
# Содержит общие, не привязанные к комнатам или устройствам сущности:
# 1. МОНИТОРИНГ СИСТЕМЫ
# • Размер БД MariaDB
# • Фаза загрузки (system_startup_phase)
# • Присутствие (someone_is_home, andrei_is_home)
# 2. ГЛОБАЛЬНЫЕ РЕЖИМЫ
# • Режим тишины (23:00–09:00)
# • Режим уборки в ванной
# • Форсированное отключение камер
# 3. АВТОМАТИЗАЦИЯ УСТРОЙСТВ ПРИ ОТСУТСТВИИ
# • Камеры: включаются через 2 мин после ухода
# • Отпариватель: выключается при уходе
# • Свет + ТВ: выключаются в будни 09:00–17:00
# 4. ТЕХНИЧЕСКИЕ ХЕЛПЕРЫ
# • Флаги стиральной машины (цикл, pre_restart)
# • Очистка БД (recorder.purge в 03:40)
# • Сброс флагов при старте
# 5. ГРУППЫ
# • all_residents, cameras, living_room_tv
# ПРИМЕЧАНИЕ:
# ВСЁ, ЧТО КАСАЕТСЯ КЛИМАТА, ВЫНЕСЕНО В:
# • helper_climate_common.yaml — инфраструктура
# • room_livingroom_*.yaml — логика устройств
################################################################################
#
# ДОБАВЛЕНО:
# • Гостевой режим (guest_mode) — имитирует присутствие для света/климата,
#   но принудительно включает камеры.
#
################################################################################

sensor:
  # Измерение размера БД MariaDB
  - platform: sql
    db_url: !secret db_link
    queries:
      - name: Maria DB size
        query: >
          SELECT table_schema AS "database", ROUND(SUM(data_length + index_length) / 1048576, 2) AS "value"
          FROM information_schema.tables WHERE table_schema = "homeassistant" GROUP BY table_schema;
        column: "value"
        unit_of_measurement: MB

##############################################################################
# ШАБЛОННЫЕ СЕНСОРЫ
##############################################################################
template:
  - binary_sensor:
      # ----------------------------------------------------------------------
      # Кто-то дома (С учетом гостей!)
      # ----------------------------------------------------------------------
      # Логика изменена: теперь возвращает ON, если:
      # 1. Кто-то из жильцов (group.all_residents) дома
      # 2. ИЛИ включен Гостевой режим
      # Это позволяет свету и розеткам работать, когда вас нет, но есть гости.
      # ----------------------------------------------------------------------
      - name: "Someone is Home"
        unique_id: someone_is_home
        device_class: occupancy
        availability: >
          {{ expand('group.all_residents') | list | count > 0 }}
        state: >
          {{ 
             (expand('group.all_residents') | selectattr('state', 'eq', 'home') | list | count > 0)
             or is_state('input_boolean.guest_mode', 'on')
          }}

      # Андрей дома
      - name: "Andrei is Home"
        unique_id: andrei_is_home
        device_class: occupancy
        availability: >
          {{ states('sensor.pixel_8_pro_wi_fi_connection') not in ['unknown', 'unavailable'] }}
        state: >
          {{ is_state('person.master', 'home') or is_state('sensor.pixel_8_pro_wi_fi_connection', 'mdhouse') }}

      # Любая балконная дверь открыта
      - name: "Doors in Kitchen Livingroom"
        unique_id: doors_in_kitchen_livingroom
        device_class: door
        availability: >
          {{ states('binary_sensor.gostinaia_balkon_contact') not in ['unknown', 'unavailable']
             and states('binary_sensor.0x00158d0003ce9922_contact') not in ['unknown', 'unavailable'] }}
        state: >
          {{ is_state('binary_sensor.gostinaia_balkon_contact', 'on')
             or is_state('binary_sensor.0x00158d0003ce9922_contact', 'on') }}

  - sensor:
      - name: "Суммарная мощность розеток гостиной"
        unique_id: livingroom_sockets_power_total
        unit_of_measurement: W
        state: >
          {{ states('sensor.livingroom_socket_l_power') | float(0) + states('sensor.livingroom_socket_r_power') | float(0) }}

##############################################################################
# ВХОДНЫЕ ПАРАМЕТРЫ
##############################################################################
input_boolean:
  # --------------------------------------------------------------------------
  # Гостевой режим (НОВОЕ)
  # --------------------------------------------------------------------------
  # При включении:
  # • Система считает, что "Кто-то дома" (свет не гаснет, климат работает)
  # • Камеры принудительно ВКЛЮЧАЮТСЯ (пишут гостей)
  guest_mode:
    name: "Гостевой режим"
    icon: mdi:account-group
    # initial: off  <-- Закомментировано, чтобы сохранялось при рестарте

  system_startup_phase:
    name: "Фаза загрузки системы"
    initial: on
    icon: mdi:timer-sand

  silent_mode:
    name: "Режим тишины"
    initial: off
    icon: mdi:emoticon-neutral-outline

  bathroom_cleaning_mode:
    name: "Режим уборки в ванной"
    initial: off
    icon: mdi:broom

  force_camera_off:
    name: "Форсированное отключение камер"
    initial: off
    icon: mdi:cctv-off

  bathroom_lights_startup_protection:
    name: "Защита освещения ванной при запуске"
    initial: on
    icon: mdi:shield-home

  wm_cycle_seen_start:
    name: "Стиралка: цикл начинался после текущего старта HA"
    initial: off
    icon: mdi:flag-outline

  washing_machine_running:
    name: "Стиральная машина работает"
    initial: off
    icon: mdi:washing-machine

  washing_machine_pre_restart_state:
    name: "Washing Machine Pre-Restart State"
    initial: off
    icon: mdi:washing-machine

  wm_socket_outage_active:
    name: "Стиралка: авария питания активна"
    initial: off
    icon: mdi:power-plug-off

  doorbell_spam_guard:
    name: Doorbell spam guard
    icon: mdi:bell-badge

  xiaomi_home_integration_unstable:
    name: "Xiaomi Home: интеграция нестабильна"
    initial: off
    icon: mdi:alert-circle

##############################################################################
# ВХОДНЫЕ ТЕКСТОВЫЕ
#############################################################################
input_text:
  currently_home:
    name: "Currently Home"
    min: 0
    max: 255

##############################################################################
# ГРУППЫ
##############################################################################
group:
  all_residents:
    name: "Все Жильцы"
    entities:
      - person.master

  cameras:
    name: "Камеры"
    entities:
      - switch.chuangmi_cn_309825146_ipc019_on_p_2_1
      - switch.chuangmi_cn_311366982_ipc019_on_p_2_1

  living_room_tv:
    name: "Телевизоры в гостиной"
    entities:
      - media_player.televizor_v_gostinoi
      - media_player.android_tv_192_168_100_171

##############################################################################
# СКРИПТ ЛОГИРОВАНИЯ
##############################################################################
script:
  log_helper_event:
    alias: "HELPER SCRIPT: Логирование события"
    mode: parallel
    fields:
      level:
        description: "debug, info, warning, error, critical"
        example: "info"
      message:
        description: "Текст сообщения"
        example: "Event fired"
      source:
        description: "Источник"
      trigger_entity:
        description: "Триггер"
      trigger_from:
        description: "Старое состояние"
      trigger_to:
        description: "Новое состояние"
      extra:
        description: "Доп. контекст"
      notify:
        description: "Отправить в Telegram"
        example: true
    sequence:
      - variables:
          _level: "{{ (level | default('info')) | lower }}"
          _source: "{{ source | default(this.entity_id) }}"
          _trigger_entity: "{{ trigger_entity | default('') }}"
          _trigger_from: "{{ trigger_from | default('') }}"
          _trigger_to: "{{ trigger_to | default('') }}"
          _extra: "{{ extra | default('') }}"
          _notify_request: "{{ notify | default(false) }}"
          _should_notify: >
            {{ _notify_request or _level in ['error', 'critical'] }}
      - service: system_log.write
        data:
          level: >
            {% set allowed = ['debug','info','warning','error','critical'] %}
            {{ _level if _level in allowed else 'info' }}
          message: >
            [{{ _source }}] {{ message }}
            {% if _trigger_entity %} | trigger={{ _trigger_entity }} {% endif %}
            {% if _trigger_from %} | from={{ _trigger_from }} {% endif %}
            {% if _trigger_to %} | to={{ _trigger_to }} {% endif %}
            {% if _extra %} | {{ _extra }} {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ _should_notify }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_master
                data:
                  message: |-
                    [{{ _level | upper }}] {{ message }}
                    source: {{ _source }}
                    {% if _trigger_entity %}
                    trigger: {{ _trigger_entity }} ({{ _trigger_from }} → {{ _trigger_to }})
                    {% endif %}
                    {% if _extra %}
                    extra: {{ _extra }}
                    {% endif %}

##############################################################################
# АВТОМАТИЗАЦИИ
##############################################################################
automation:
  - id: "2674efa1-8470-45f4-842a-fcabebc5ea20"
    alias: "HELPER: Xiaomi Home — интеграция нестабильна"
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - fan.zhimi_cn_271517251_mb3_s_2_air_purifier
          - humidifier.xiaomi_cn_823407205_p3
          - light.lumi_cn_132386223_v3_s_4_light
          - switch.chuangmi_cn_309825146_ipc019_on_p_2_1
          - switch.chuangmi_cn_311366982_ipc019_on_p_2_1
          - vacuum.dreame_cn_332835372_mc1808
        to: "unavailable"
        from: ["on", "off"]
        for: "00:00:10"
    condition:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.xiaomi_home_integration_unstable
        state: "off"
      - condition: template
        value_template: >
          {% set devices = [
            'fan.zhimi_cn_271517251_mb3_s_2_air_purifier',
            'humidifier.xiaomi_cn_823407205_p3',
            'light.lumi_cn_132386223_v3_s_4_light',
            'switch.chuangmi_cn_309825146_ipc019_on_p_2_1',
            'switch.chuangmi_cn_311366982_ipc019_on_p_2_1',
            'vacuum.dreame_cn_332835372_mc1808'
          ] %}
          {{ devices | map('states') | select('eq','unavailable') | list | count >= (devices | count // 2 + 1) }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.xiaomi_home_integration_unstable
      - service: script.log_helper_event
        data:
          level: warning
          message: "Xiaomi Home: интеграция нестабильна, флаг on."
          source: "{{ this.entity_id }}"
          notify: true
      - delay: "00:01:00"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.xiaomi_home_integration_unstable

  - id: "c6382818-05ed-4590-be92-b367489fb0e1"
    alias: "HELPER: Обновление списка пользователей"
    mode: single
    triggers:
      - trigger: state
        entity_id: [binary_sensor.andrei_is_home, person.master]
    actions:
      - action: input_text.set_value
        target:
          entity_id: input_text.currently_home
        data:
          value: >
            {% set home_users = [] %}
            {% if is_state('binary_sensor.andrei_is_home', 'on') %}{% set home_users = home_users + ['Andrei'] %}{% endif %}
            {{ home_users | join(', ') }}

  - id: "38ea50fb-09bc-4d39-a771-1727ab72f265"
    alias: "HELPER: Фаза: Включение датчика загрузки"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.system_startup_phase

  - id: "03e3ffd0-4e1e-4200-b0e3-1ce6a2d77d6a"
    alias: "HELPER: Фаза: Отключение датчика загрузки (2 минуты)"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - delay: "00:02:00"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.system_startup_phase

  - id: "cc269239-a6dd-422f-ba2a-3d57e4c5981e"
    alias: "HELPER: Установка режима тишины (23:00)"
    mode: single
    triggers:
      - trigger: time
        at: "23:00:00"
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.silent_mode

  - id: "6ed14663-ebe5-4ab3-bc3b-43e682c45f3b"
    alias: "HELPER: Снятие режима тишины (09:00)"
    mode: single
    triggers:
      - trigger: time
        at: "09:00:00"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.silent_mode

  # ----------------------------------------------------------------------------
  # УПРАВЛЕНИЕ КАМЕРАМИ (ОБНОВЛЕНО ПОД ГОСТЕВОЙ РЕЖИМ)
  # ----------------------------------------------------------------------------
  - id: "bee019e8-c011-4283-85df-4cbbbc00e92f"
    alias: "Камеры: Управление в зависимости от присутствия и гостей"
    description: >
      Включает камеры, если никого нет дома ИЛИ если включен режим гостей.
      Выключает камеры, только если кто-то дома И режим гостей выключен.
    mode: single
    triggers:
      # 1. Никого нет дома
      - trigger: state
        entity_id: binary_sensor.someone_is_home
        to: "off"
        for: "00:02:00"
        id: away
      # 2. Кто-то пришел
      - trigger: state
        entity_id: binary_sensor.someone_is_home
        to: "on"
        for: "00:02:00"
        id: home
      # 3. Включили режим гостей (нужна запись!)
      - trigger: state
        entity_id: input_boolean.guest_mode
        to: "on"
        id: guest_on
      # 4. Выключили режим гостей
      - trigger: state
        entity_id: input_boolean.guest_mode
        to: "off"
        id: guest_off

    conditions:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.force_camera_off
        state: "off"

    actions:
      - choose:
          # --- ВКЛЮЧЕНИЕ КАМЕР ---
          # Включаем, если:
          # - Все ушли (away)
          # - Включили режим гостей (guest_on)
          # - Выключили режим гостей, НО дома никого нет (проверка условия)
          - conditions:
              - condition: or
                conditions:
                  - condition: trigger
                    id: away
                  - condition: trigger
                    id: guest_on
                  - condition: and
                    conditions:
                      - condition: trigger
                        id: guest_off
                      # Проверяем реальное присутствие людей (без учета guest_mode, т.к. он уже off)
                      - condition: state
                        entity_id: binary_sensor.someone_is_home
                        state: "off"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: group.cameras
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_master
                data:
                  message: >
                    {% if trigger.id == 'guest_on' %}
                    📹 Камеры включены (Гостевой режим).
                    {% else %}
                    📹 Камеры включены (Никого нет дома).
                    {% endif %}

          # --- ВЫКЛЮЧЕНИЕ КАМЕР ---
          # Выключаем только если:
          # - Пришли домой (home) И гости выключены
          # - Выключили гостей (guest_off) И дома кто-то есть
          - conditions:
              - condition: or
                conditions:
                  - condition: and
                    conditions:
                      - condition: trigger
                        id: home
                      - condition: state
                        entity_id: input_boolean.guest_mode
                        state: "off"
                  - condition: and
                    conditions:
                      - condition: trigger
                        id: guest_off
                      - condition: state
                        entity_id: binary_sensor.someone_is_home
                        state: "on"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: group.cameras
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_master
                data:
                  message: "📹 Камеры выключены: Кто-то дома."

  # --------------------------------------------------------------------------
  # Блокировка включения камер при force_camera_off (без изменений)
  # --------------------------------------------------------------------------
  - id: "98df0b92-1c60-4e48-a065-3412a0706124"
    alias: "Камеры: Блокировка включения при форсированном отключении"
    mode: parallel
    triggers:
      - trigger: state
        entity_id:
          - switch.chuangmi_cn_309825146_ipc019_on_p_2_1
          - switch.chuangmi_cn_311366982_ipc019_on_p_2_1
        to: "on"
      - trigger: state
        entity_id: input_boolean.force_camera_off
        to: "on"
    conditions:
      - condition: state
        entity_id: input_boolean.force_camera_off
        state: "on"
    actions:
      - action: switch.turn_off
        target:
          entity_id:
            - switch.chuangmi_cn_309825146_ipc019_on_p_2_1
            - switch.chuangmi_cn_311366982_ipc019_on_p_2_1
      - action: notify.send_message
        target:
          entity_id: notify.telegram_master
        data:
          message: "Попытка включения камер заблокирована (force_camera_off)."

  - id: "779498b6-e63f-454d-8866-8e7e7a94d8e4"
    alias: "MariaDB: Очистка базы в 3:40"
    mode: single
    triggers:
      - trigger: time
        at: "03:40:00"
    actions:
      - action: recorder.purge
        data:
          keep_days: 90
      - action: script.log_helper_event
        data:
          level: info
          message: "MariaDB: очистка истории завершена."

  - id: "8a46561c-f48f-4c93-b53e-d1af940fdb6d"
    alias: "Рабочие дни: Выключение света, отпаривателя и ТВ (09:00-17:00)"
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.someone_is_home
        to: "off"
      - trigger: time
        at: "09:00:00"
    conditions:
      - condition: time
        weekday: [mon, tue, wed, thu, fri]
      - condition: time
        after: "09:00:00"
        before: "17:00:00"
      - condition: state
        entity_id: input_boolean.bathroom_cleaning_mode
        state: "off"
      - condition: state
        entity_id: binary_sensor.someone_is_home
        state: "off"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ states('binary_sensor.someone_is_home') in ['unknown', 'unavailable'] }}
            sequence:
              - stop: "Сенсор присутствия в неизвестном состоянии."
        default:
          - action: homeassistant.turn_off
            target:
              entity_id: light.all_lights
          - action: homeassistant.turn_off
            target:
              entity_id: group.living_room_tv

  - id: "ee320693-2e76-435b-8012-3a908046d4d0"
    alias: "Выключение отпаривателя при отсутствии дома"
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.someone_is_home
        to: "off"
    actions:
      - action: switch.turn_off
        target:
          entity_id: switch.smart_plug_in_unit_vykliuchatel

  - id: "76238992-89bc-48c6-bd82-27e8a7c79b6d"
    alias: "HELPER: Сброс флагов стирки при старте HA"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.wm_cycle_seen_start
            - input_boolean.washing_machine_running
            - input_boolean.wm_socket_outage_active
