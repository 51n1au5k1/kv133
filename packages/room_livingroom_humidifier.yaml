################################################################################
# /packages/room_livingroom_humidifier.yaml
################################################################################
#
# АВТОМАТИЧЕСКОЕ УПРАВЛЕНИЕ УВЛАЖНИТЕЛЕМ В ГОСТИНОЙ (ALL-IN-ONE)
#
# ЛОГИКА:
# • Основной сенсор: sensor.livingroom_average_humidity
# • Бинарный сенсор (гистерезис): binary_sensor.livingroom_need_humidify
# • Единый контроллер: включает/выключает по гистерезису + блокировкам
#
# ЗАЩИТА:
# • Min On/Off time через input_datetime.humidifier_last_on/off (из helper_climate_common)
# • Блокировка при открытых дверях (doors_in_kitchen_livingroom)
# • Блокировка по low_water (input_boolean.humidifier_low_water_notified)
#   - событие low_water -> ставим флаг ON
#   - если устройство реально смогло включиться -> сбрасываем флаг OFF
#
# ВАЖНО:
# • CO2 НЕ используется
# • input_datetime.humidifier_last_on/off НЕ пишем вручную
################################################################################

##############################################################################
#                           ВХОДНЫЕ ПЕРЕМЕННЫЕ
##############################################################################

input_boolean:
  livingroom_humidifier_auto:
    name: "Гостиная: авто-режим увлажнителя"
    icon: mdi:autorenew
    initial: true

input_number:
  livingroom_hum_low:
    name: "Гостиная: нижний порог RH (%)"
    min: 20
    max: 60
    step: 1
    initial: 47
    unit_of_measurement: "%"

  livingroom_hum_high:
    name: "Гостиная: верхний порог RH (%)"
    min: 30
    max: 70
    step: 1
    initial: 50
    unit_of_measurement: "%"

  livingroom_hum_min_on_min:
    name: "Мин. время работы увлажнителя (мин)"
    min: 1
    max: 60
    step: 1
    initial: 10

  livingroom_hum_min_off_min:
    name: "Мин. время простоя увлажнителя (мин)"
    min: 1
    max: 60
    step: 1
    initial: 15

##############################################################################
#                          БИНАРНЫЙ СЕНСОР (ГИСТЕРЕЗИС)
##############################################################################

template:
  - binary_sensor:
      - unique_id: livingroom_need_humidify
        name: "Гостиная: нужна влажность (гистерезис)"
        device_class: moisture
        icon: >-
          {% if is_state('binary_sensor.livingroom_need_humidify', 'on') %}
            mdi:water-alert
          {% else %}
            mdi:water-check
          {% endif %}
        availability: >-
          {{ states('sensor.livingroom_average_humidity') not in ['unknown','unavailable',''] }}
        state: >-
          {% set rh = states('sensor.livingroom_average_humidity') | float(default=none) %}
          {% if rh is none %}
            {{ states('binary_sensor.livingroom_need_humidify') }}
          {% else %}
            {% set low = states('input_number.livingroom_hum_low') | float(47) %}
            {% set high = states('input_number.livingroom_hum_high') | float(50) %}
            {% if low >= high %}{% set high = low + 1 %}{% endif %}
            {% set was_on = is_state('binary_sensor.livingroom_need_humidify','on') %}
            {% if was_on %}
              {{ rh < high }}
            {% else %}
              {{ rh < low }}
            {% endif %}
          {% endif %}

##############################################################################
#                              АВТОМАТИЗАЦИИ
##############################################################################

automation:
  # ==========================================================================
  # ЕДИНЫЙ КОНТРОЛЛЕР УВЛАЖНИТЕЛЯ
  # ==========================================================================
  - id: "livingroom_humidifier_controller_aio"
    alias: "Гостиная: Управление увлажнителем (All-in-One)"
    description: >
      Единая автоматизация управления увлажнителем:
      • ON/OFF по binary_sensor.livingroom_need_humidify (гистерезис)
      • Блокировки: двери, low_water
      • Антидребезг: min on/off time (по input_datetime из helper_climate_common)
      • Watchdog: каждые 5 минут на случай пропуска событий
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.livingroom_need_humidify
        to: "on"
        for: "00:03:00"
        id: need_on

      - platform: state
        entity_id: binary_sensor.livingroom_need_humidify
        to: "off"
        for: "00:03:00"
        id: need_off

      - platform: time_pattern
        minutes: "/5"
        id: watchdog

      - platform: state
        entity_id: binary_sensor.doors_in_kitchen_livingroom
        to: "off"
        for: "00:01:00"
        id: door_closed

      - platform: state
        entity_id: input_boolean.livingroom_humidifier_auto
        to: "on"
        id: auto_on

    condition:
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"

      - condition: state
        entity_id: input_boolean.livingroom_humidifier_auto
        state: "on"

      - condition: state
        entity_id: input_boolean.xiaomi_home_integration_unstable
        state: "off"

      - condition: template
        value_template: >
          {{ states('humidifier.xiaomi_cn_823407205_p3') not in ['unavailable', 'unknown', ''] }}

    action:
      - variables:
          hum: humidifier.xiaomi_cn_823407205_p3

          # --- безопасные поля триггера (time_pattern не имеет from/to) ---
          trig_platform: "{{ trigger.platform if trigger is defined and trigger.platform is defined else '' }}"
          trig_id: "{{ trigger.id if trigger is defined and trigger.id is defined else '' }}"
          trig_entity: "{{ trigger.entity_id if trigger is defined and trigger.entity_id is defined else '' }}"
          trig_from: >-
            {{ trigger.from_state.state
               if trigger is defined and trigger.from_state is defined and trigger.from_state is not none
               else '' }}
          trig_to: >-
            {{ trigger.to_state.state
               if trigger is defined and trigger.to_state is defined and trigger.to_state is not none
               else '' }}

          need: "{{ is_state('binary_sensor.livingroom_need_humidify', 'on') }}"
          is_on: "{{ is_state(hum, 'on') }}"

          doors_closed: "{{ is_state('binary_sensor.doors_in_kitchen_livingroom', 'off') }}"
          low_water_flag: "{{ is_state('input_boolean.humidifier_low_water_notified', 'on') }}"

          last_on: "{{ states('input_datetime.humidifier_last_on') }}"
          last_off: "{{ states('input_datetime.humidifier_last_off') }}"
          min_on: "{{ states('input_number.livingroom_hum_min_on_min') | int(10) }}"
          min_off: "{{ states('input_number.livingroom_hum_min_off_min') | int(15) }}"

          # ВАЖНО:
          # - last_on может быть пустым сразу после ручного включения (не успел обновиться helper)
          # - чтобы не выключать мгновенно, при пустом last_on считаем diff_on_min = 0
          diff_on_min: >-
            {% if last_on in ['unknown','unavailable','', None] %}
              0
            {% else %}
              {{ ((as_timestamp(now()) - as_timestamp(last_on)) / 60) | round(1) }}
            {% endif %}

          # last_off пустой -> разрешаем включать (ставим большое значение)
          diff_off_min: >-
            {% if last_off in ['unknown','unavailable','', None] %}
              999999
            {% else %}
              {{ ((as_timestamp(now()) - as_timestamp(last_off)) / 60) | round(1) }}
            {% endif %}

      - choose:
          # ----------------------------------------------------------
          # ВКЛЮЧЕНИЕ
          # ----------------------------------------------------------
          - conditions:
              - condition: template
                value_template: "{{ need and (not is_on) }}"
              - condition: template
                value_template: "{{ doors_closed }}"
              - condition: template
                value_template: "{{ not low_water_flag }}"
              - condition: template
                value_template: "{{ diff_off_min >= min_off }}"
            sequence:
              - service: humidifier.turn_on
                target:
                  entity_id: "{{ hum }}"

          # ----------------------------------------------------------
          # ВЫКЛЮЧЕНИЕ
          # ----------------------------------------------------------
          - conditions:
              - condition: template
                value_template: "{{ (not need) and is_on }}"
              - condition: template
                value_template: "{{ diff_on_min >= min_on }}"
            sequence:
              - service: humidifier.turn_off
                target:
                  entity_id: "{{ hum }}"

        default:
          - service: script.log_helper_event
            data:
              level: debug
              message: "Humidifier controller: action skipped by conditions."
              source: "{{ this.entity_id }}"
              trigger_entity: "{{ trig_entity }}"
              trigger_from: "{{ trig_from }}"
              trigger_to: "{{ trig_to }}"
              extra: >-
                trig_platform={{ trig_platform }};
                trig_id={{ trig_id }};
                need={{ need }};
                is_on={{ is_on }};
                doors_closed={{ doors_closed }};
                low_water_flag={{ low_water_flag }};
                diff_on_min={{ diff_on_min }} (min_on={{ min_on }});
                diff_off_min={{ diff_off_min }} (min_off={{ min_off }});
                humidity={{ states('sensor.livingroom_average_humidity') }};
                low={{ states('input_number.livingroom_hum_low') }};
                high={{ states('input_number.livingroom_hum_high') }};

  # ==========================================================================
  # LOW WATER: единая точка управления флагом humidifier_low_water_notified
  # ==========================================================================
  - id: "livingroom_humidifier_low_water_set_flag"
    alias: "Гостиная: Увлажнитель — low water: поднять флаг"
    description: >
      Xiaomi event-энтити не даёт нормальных атрибутов (event_type=null),
      поэтому просто: поймали событие low_water -> ставим флаг.
    mode: single
    trigger:
      - platform: state
        entity_id: event.xiaomi_cn_823407205_p3_low_water_level_e_2_1
    condition:
      - condition: state
        entity_id: input_boolean.xiaomi_home_integration_unstable
        state: "off"
      - condition: template
        value_template: >
          {{ states('humidifier.xiaomi_cn_823407205_p3') not in ['unavailable', 'unknown', ''] }}
    action:
      - variables:
          trig_platform: "{{ trigger.platform if trigger is defined and trigger.platform is defined else '' }}"
          trig_entity: "{{ trigger.entity_id if trigger is defined and trigger.entity_id is defined else '' }}"
          trig_from: >-
            {{ trigger.from_state.state
               if trigger is defined and trigger.from_state is defined and trigger.from_state is not none
               else '' }}
          trig_to: >-
            {{ trigger.to_state.state
               if trigger is defined and trigger.to_state is defined and trigger.to_state is not none
               else '' }}

      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.humidifier_low_water_notified

      - service: script.log_helper_event
        data:
          level: warning
          message: "Humidifier: low water event detected -> set humidifier_low_water_notified=on"
          source: "{{ this.entity_id }}"
          trigger_entity: "{{ trig_entity }}"
          trigger_from: "{{ trig_from }}"
          trigger_to: "{{ trig_to }}"
          extra: "platform={{ trig_platform }}; event_type_attr={{ state_attr('event.xiaomi_cn_823407205_p3_low_water_level_e_2_1','event_type') }}"

  - id: "livingroom_humidifier_low_water_auto_clear_on_start"
    alias: "Гостиная: Увлажнитель — low water: сброс флага если смог включиться"
    description: >
      Если увлажнитель реально включился, значит защита по воде разрешила работу,
      следовательно флаг low_water можно сбросить.
    mode: restart
    trigger:
      - platform: state
        entity_id: humidifier.xiaomi_cn_823407205_p3
        to: "on"
        for: "00:00:10"
    condition:
      - condition: state
        entity_id: input_boolean.humidifier_low_water_notified
        state: "on"
      - condition: state
        entity_id: input_boolean.xiaomi_home_integration_unstable
        state: "off"
    action:
      - variables:
          trig_platform: "{{ trigger.platform if trigger is defined and trigger.platform is defined else '' }}"
          trig_entity: "{{ trigger.entity_id if trigger is defined and trigger.entity_id is defined else '' }}"
          trig_from: >-
            {{ trigger.from_state.state
               if trigger is defined and trigger.from_state is defined and trigger.from_state is not none
               else '' }}
          trig_to: >-
            {{ trigger.to_state.state
               if trigger is defined and trigger.to_state is defined and trigger.to_state is not none
               else '' }}

      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.humidifier_low_water_notified

      - service: script.log_helper_event
        data:
          level: info
          message: "Humidifier: device stayed ON -> clear humidifier_low_water_notified=off"
          source: "{{ this.entity_id }}"
          trigger_entity: "{{ trig_entity }}"
          trigger_from: "{{ trig_from }}"
          trigger_to: "{{ trig_to }}"
          extra: "platform={{ trig_platform }}; auto_clear_on_start=true"
