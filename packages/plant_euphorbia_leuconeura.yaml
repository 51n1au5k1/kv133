################################################################################
# /packages/plant_euphorbia_leuconeura.yaml
################################################################################

# ==============================================================================
# НАСТРОЙКИ (ВКЛ/ВЫКЛ УВЕДОМЛЕНИЙ)
# ==============================================================================
input_boolean:
  euphorbia_notify_soil:
    name: "Молочай: Уведомлять о поливе"
    icon: mdi:water
    # initial: on  <-- Убрали, чтобы сохранялось состояние

  euphorbia_notify_temp:
    name: "Молочай: Уведомлять о температуре"
    icon: mdi:thermometer
    # initial: on

  euphorbia_notify_lux:
    name: "Молочай: Уведомлять о свете"
    icon: mdi:brightness-6
    # initial: on

# ==============================================================================
# ХРАНЕНИЕ СОСТОЯНИЯ (История и таймеры)
# ==============================================================================
input_text:
  notification_history_euphorbia_leuconeura:
    name: "Молочай: История уведомлений"
    max: 255

input_datetime:
  last_euphorbia_leuconeura_soil_notification:
    name: "Last Euphorbia Soil Notif"
    has_date: true
    has_time: true
  last_euphorbia_leuconeura_temperature_notification:
    name: "Last Euphorbia Temp Notif"
    has_date: true
    has_time: true
  last_euphorbia_leuconeura_illuminance_notification:
    name: "Last Euphorbia Lux Notif"
    has_date: true
    has_time: true

# ==============================================================================
# СГЛАЖИВАЮЩИЕ ФИЛЬТРЫ
# ==============================================================================
sensor:
  - platform: filter
    name: "euphorbia_leuconeura_filtered_temperature"
    entity_id: sensor.flower_euphorbia_leuconeura_temperature_2
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00"
        precision: 2

  - platform: filter
    name: "euphorbia_leuconeura_filtered_soil_moisture"
    entity_id: sensor.flower_euphorbia_leuconeura_soil_moisture_2
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00"
        precision: 2

  - platform: filter
    name: "euphorbia_leuconeura_filtered_illuminance"
    entity_id: sensor.flower_euphorbia_leuconeura_illuminance
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00"
        precision: 2

  - platform: filter
    name: "euphorbia_leuconeura_filtered_air_humidity"
    entity_id: sensor.flower_euphorbia_leuconeura_humidity_2
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00"
        precision: 2

# ==============================================================================
# БИНАРНЫЕ СЕНСОРЫ (ЛОГИКА УВЕДОМЛЕНИЙ)
# ==============================================================================
template:
  - binary_sensor:
      # --- ПОЧВА ---
      - unique_id: plant_alert_euphorbia_leuconeura_soil
        name: "Необходимость полива (Молочай)"
        device_class: problem
        availability: >-
          {{ states('sensor.euphorbia_leuconeura_filtered_soil_moisture') not in ['unknown','unavailable',''] }}
        state: >-
          {# Сначала проверяем мастер-переключатель #}
          {% if is_state('input_boolean.euphorbia_notify_soil', 'off') %}
            false
          {% else %}
            {% set moisture = states('sensor.euphorbia_leuconeura_filtered_soil_moisture') | float(0) %}
            {% set min_thr  = states('number.euphorbia_leuconeura_min_soil_moisture') | float(10) %}
            {% set max_thr  = states('number.euphorbia_leuconeura_max_soil_moisture') | float(50) %}
            
            {% set was_on   = is_state('binary_sensor.plant_alert_euphorbia_leuconeura_soil','on') %}
            {% set release_thr = min_thr + 5 %}
            
            {% if moisture > max_thr %} false
            {% elif was_on %} {{ moisture < release_thr }}
            {% else %} {{ moisture < min_thr }}
            {% endif %}
          {% endif %}
        icon: mdi:water-alert

      # --- ТЕМПЕРАТУРА ---
      - unique_id: plant_alert_euphorbia_leuconeura_temperature
        name: "Необходимость согрева или охлаждения (Молочай)"
        device_class: problem
        state: >-
          {% if is_state('input_boolean.euphorbia_notify_temp', 'off') %}
            false
          {% else %}
            {% set t    = states('sensor.euphorbia_leuconeura_filtered_temperature') | float(0) %}
            {% set tmin = states('number.euphorbia_leuconeura_min_temperature') | float(8) %}
            {% set tmax = states('number.euphorbia_leuconeura_max_temperature') | float(35) %}
            {{ (t > 0) and (t < tmin or t > tmax) }}
          {% endif %}
        icon: mdi:sun-thermometer-outline

      # --- ОСВЕЩЕННОСТЬ ---
      - unique_id: plant_alert_euphorbia_leuconeura_illuminance
        name: "Необходимость коррекции освещенности (Молочай)"
        device_class: problem
        state: >-
          {% if is_state('input_boolean.euphorbia_notify_lux', 'off') %}
            false
          {% else %}
            {% set lux     = states('sensor.euphorbia_leuconeura_filtered_illuminance') | float(0) %}
            {% set min_lux = states('number.euphorbia_leuconeura_min_illuminance') | float(2800) %}
            {% set max_lux = states('number.euphorbia_leuconeura_max_illuminance') | float(120000) %}
            {{ lux < min_lux or lux > max_lux }}
          {% endif %}

# ==============================================================================
# АВТОМАТИЗАЦИИ
# ==============================================================================
automation:
  # 1. Полив
  - id: "euphorbia_notify_soil"
    alias: "Растение. Молочай: Уведомление о поливе"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.plant_alert_euphorbia_leuconeura_soil
        to: "on"
        for: "00:30:00"
    condition:
      - condition: state
        entity_id: person.master
        state: "home"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    action:
      - service: script.plant_check_conditions
        data:
          plant_name: "Молочай"
          plant_name_latin: "euphorbia_leuconeura"

  # 2. Температура
  - id: "euphorbia_notify_temp"
    alias: "Растение. Молочай: Уведомление о температуре"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.plant_alert_euphorbia_leuconeura_temperature
        to: "on"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: person.master
        state: "home"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    action:
      - service: script.plant_check_conditions
        data:
          plant_name: "Молочай"
          plant_name_latin: "euphorbia_leuconeura"

  # 3. Свет
  - id: "euphorbia_notify_lux"
    alias: "Растение. Молочай: Уведомление о свете"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.plant_alert_euphorbia_leuconeura_illuminance
        to: "on"
        for: "00:30:00"
    condition:
      - condition: state
        entity_id: person.master
        state: "home"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    action:
      - service: script.plant_check_conditions
        data:
          plant_name: "Молочай"
          plant_name_latin: "euphorbia_leuconeura"

  # 4. Периодическая проверка
  - id: "euphorbia_periodic_check"
    alias: "Растение. Молочай: Периодическая проверка"
    trigger:
      - platform: time_pattern
        hours: "/6"
    action:
      - service: script.plant_check_conditions
        data:
          plant_name: "Молочай"
          plant_name_latin: "euphorbia_leuconeura"
