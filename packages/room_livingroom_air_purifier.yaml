################################################################################
# /packages/room_livingroom_air_purifier.yaml
################################################################################
#
# АВТОМАТИЧЕСКОЕ УПРАВЛЕНИЕ ОЧИСТИТЕЛЕМ ВОЗДУХА В ГОСТИНОЙ
# (ALL-IN-ONE ВЕРСИЯ)
#
# ЛОГИКА:
# • Основной сенсор: sensor.living_room_pm25_avg (статистика за 5 мин)
# • Бинарный сенсор (гистерезис): рассчитывает "нужно/не нужно"
# • Автоматизация: ЕДИНАЯ, проверяет условия по событиям и по таймеру.
#
# УСТРОЙСТВО:
# • fan.zhimi_mb3_a5d3_air_purifier
#
################################################################################

##############################################################################
#                           ВХОДНЫЕ ПЕРЕМЕННЫЕ
##############################################################################

input_boolean:
  livingroom_air_purifier_auto:
    name: "Гостиная: авто-режим очистителя"
    icon: mdi:autorenew
    initial: true

input_number:
  livingroom_pm25_low:
    name: "Гостиная: нижний порог PM2.5 (µg/m³)"
    min: 0
    max: 75
    step: 1
    initial: 10
    unit_of_measurement: "µg/m³"

  livingroom_pm25_high:
    name: "Гостиная: верхний порог PM2.5 (µg/m³)"
    min: 5
    max: 100
    step: 1
    initial: 20
    unit_of_measurement: "µg/m³"

  livingroom_air_min_on_min:
    name: "Очиститель: мин. время работы (мин)"
    min: 1
    max: 120
    step: 1
    initial: 10

  livingroom_air_min_off_min:
    name: "Очиститель: мин. время простоя (мин)"
    min: 1
    max: 120
    step: 1
    initial: 15

##############################################################################
#                               СЕНСОРЫ
##############################################################################

sensor:
  # Статистический сенсор для сглаживания (среднее за 5 минут)
  - platform: statistics
    name: "Living Room PM2.5 Avg"
    unique_id: living_room_pm2_5_avg
    entity_id: sensor.zhimi_cn_271517251_mb3_pm2_5_density_p_3_6
    state_characteristic: mean
    sampling_size: 120
    max_age:
      minutes: 5
    precision: 1

##############################################################################
#                          БИНАРНЫЙ СЕНСОР (ГИСТЕРЕЗИС)
##############################################################################
# Вся математика "включить > 20, выключить < 10" живет здесь.

template:
  - binary_sensor:
      - unique_id: livingroom_need_air_purify
        name: "Гостиная: нужна очистка воздуха"
        device_class: problem
        icon: >-
          {% if is_state('binary_sensor.livingroom_need_air_purify', 'on') %}
            mdi:air-filter
          {% else %}
            mdi:check-circle-outline
          {% endif %}
        availability: >-
          {{ states('sensor.zhimi_mb3_a5d3_pm25') not in ['unknown','unavailable','']
             or states('sensor.living_room_pm2_5_avg') not in ['unknown','unavailable',''] }}
        state: >-
          {% set pm_raw = states('sensor.zhimi_mb3_a5d3_pm25') | float(default=none) %}
          {% set pm_avg = states('sensor.living_room_pm2_5_avg') | float(default=none) %}
          {% set pm = pm_avg if pm_avg is not none else pm_raw %}
          {% if pm is none %}
            {{ states('binary_sensor.livingroom_need_air_purify') }}
          {% else %}
            {% set low  = states('input_number.livingroom_pm25_low')  | float(10) %}
            {% set high = states('input_number.livingroom_pm25_high') | float(20) %}
            {% if low >= high %}{% set high = low + 1 %}{% endif %}
            {% set was_on = is_state('binary_sensor.livingroom_need_air_purify','on') %}
            {% if was_on %}
              {{ pm > low }}
            {% else %}
              {{ pm > high }}
            {% endif %}
          {% endif %}

##############################################################################
#                              АВТОМАТИЗАЦИЯ
##############################################################################

automation:
  # --------------------------------------------------------------------------
  # ЕДИНЫЙ КОНТРОЛЛЕР ОЧИСТИТЕЛЯ
  # --------------------------------------------------------------------------
  - id: "livingroom_air_purifier_controller_aio"
    alias: "Гостиная: Управление очистителем (All-in-One)"
    description: >
      Универсальная автоматизация.
      Включает/выключает очиститель на основе бинарного сенсора гистерезиса (PM2.5).
      Содержит проверки всех блокировок (таймеры работы/простоя, авто-режим).
      Запускается по событиям И периодически (watchdog).
    mode: restart
    triggers:
      # 1. Изменение потребности (основной триггер)
      # Стабильное состояние в течение 5 минут исключает случайные скачки
      - trigger: state
        entity_id: binary_sensor.livingroom_need_air_purify
        to:
          - "on"
          - "off"
        for: "00:05:00"

      # 2. Watchdog (резервная проверка)
      # Если HA перезагрузился или таймер еще не истек в прошлый раз,
      # эта проверка сработает позже.
      - trigger: time_pattern
        minutes: "/5"

      # 3. Включение авто-режима
      # Реакция на ручное включение тумблера
      - trigger: state
        entity_id: input_boolean.livingroom_air_purifier_auto
        to: "on"

    conditions:
      # --- ГЛОБАЛЬНЫЕ БЛОКИРОВКИ ---

      # 1. Фаза загрузки HA должна пройти
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"

      # 2. Авто-режим должен быть включен
      - condition: state
        entity_id: input_boolean.livingroom_air_purifier_auto
        state: "on"

      # 3. Интеграция Xiaomi должна быть стабильна
      - condition: state
        entity_id: input_boolean.xiaomi_home_integration_unstable
        state: "off"

      # 4. Устройство должно быть доступно
      - condition: template
        value_template: >-
          {{ states('fan.zhimi_mb3_a5d3_air_purifier')
             not in ['unavailable', 'unknown'] }}

    actions:
      - choose:
          # ==================================================================
          # ВЕТКА 1: ВКЛЮЧЕНИЕ (TURN ON)
          # ==================================================================
          - conditions:
              # А. Логика: Воздух грязный, а устройство выключено
              - condition: state
                entity_id: binary_sensor.livingroom_need_air_purify
                state: "on"
              - condition: state
                entity_id: fan.zhimi_mb3_a5d3_air_purifier
                state: "off"

              # Б. Антидребезг (Min OFF time)
              # Прошло достаточно времени с последнего выключения?
              - condition: template
                value_template: >
                  {% set last_off_state = states('input_datetime.air_purifier_last_off') %}
                  {% if last_off_state in ['unknown','unavailable','','None'] %}
                    true
                  {% else %}
                    {% set last_off = last_off_state | as_timestamp %}
                    {% set min_off = states('input_number.livingroom_air_min_off_min') | int(15) %}
                    {% if last_off is none %}
                      true
                    {% else %}
                      {% set minutes_off = (as_timestamp(now()) - last_off) / 60 %}
                      {{ minutes_off >= min_off }}
                    {% endif %}
                  {% endif %}

            sequence:
              - service: fan.turn_on
                target:
                  entity_id: fan.zhimi_mb3_a5d3_air_purifier
              # Обновляем таймер последнего включения
              - service: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.air_purifier_last_on
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

          # ==================================================================
          # ВЕТКА 2: ВЫКЛЮЧЕНИЕ (TURN OFF)
          # ==================================================================
          - conditions:
              # А. Логика: Воздух чистый, а устройство работает
              - condition: state
                entity_id: binary_sensor.livingroom_need_air_purify
                state: "off"
              - condition: state
                entity_id: fan.zhimi_mb3_a5d3_air_purifier
                state: "on"

              # Б. Антидребезг (Min ON time)
              # Прошло достаточно времени с последнего включения?
              # Это заменяет опасный wait_template!
              - condition: template
                value_template: >
                  {% set last_on_state = states('input_datetime.air_purifier_last_on') %}
                  {% if last_on_state in ['unknown','unavailable','','None'] %}
                    true
                  {% else %}
                    {% set last_on = last_on_state | as_timestamp %}
                    {% set min_on = states('input_number.livingroom_air_min_on_min') | int(10) %}
                    {% if last_on is none %}
                      true
                    {% else %}
                      {% set minutes_on = (as_timestamp(now()) - last_on) / 60 %}
                      {{ minutes_on >= min_on }}
                    {% endif %}
                  {% endif %}

            sequence:
              - service: fan.turn_off
                target:
                  entity_id: fan.zhimi_mb3_a5d3_air_purifier
              # Обновляем таймер последнего выключения
              - service: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.air_purifier_last_off
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # ==========================================================================
  # ТЕХНИЧЕСКИЕ ТРИГГЕРЫ (ФИЛЬТРЫ)
  # ==========================================================================
  # Эти автоматизации оставляем отдельными, так как они служебные и не влияют на работу.

  # 1. Фильтр < 10%
  - id: "a4596f3c-27bf-48a8-a6db-62f9905f12fd"
    alias: "Триггер: фильтр очистителя <10%"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.zhimi_cn_271517251_mb3_filter_life_level_p_4_3
        below: 10
        for: "00:01:00"
    conditions:
      - condition: state
        entity_id: input_boolean.xiaomi_home_integration_unstable
        state: "off"
      - condition: template
        value_template: >-
          {{ states('fan.zhimi_mb3_a5d3_air_purifier')
             not in ['unavailable', 'unknown'] }}
    actions: []

  # 2. Фильтр > 10% (Сброс)
  - id: "373bc4e2-1993-46df-85c5-0ff0470a1630"
    alias: "Триггер: фильтр очистителя >10%"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.zhimi_cn_271517251_mb3_filter_life_level_p_4_3
        above: 10
        for: "00:01:00"
    conditions:
      - condition: state
        entity_id: input_boolean.xiaomi_home_integration_unstable
        state: "off"
      - condition: template
        value_template: >-
          {{ states('fan.zhimi_mb3_a5d3_air_purifier')
             not in ['unavailable', 'unknown'] }}
    actions: []
