################################################################################
# /packages/helper_proxmox.yaml
################################################################################
#
# Пакет вспомогательных конфигураций для работы с Proxmox Virtual Environment
# (система виртуализации с открытым исходным кодом). Этот пакет предоставляет
# инструменты для мониторинга и управления ресурсами виртуальных машин (VM) и
# контейнеров (LXC), включая нормализацию данных и расчет вклада в общую
# загрузку CPU.
#

##############################################################################
#                          ВХОДНЫЕ ЧИСЛА (input_number)
##############################################################################

input_number:
  # ОБЩЕЕ КОЛИЧЕСТВО ПОТОКОВ CPU НА ХОСТЕ PROXMOX
  # Укажите здесь общее количество потоков вашего процессора на сервере.

  proxmox_host_cpu_threads:
    name: "Всего потоков CPU на хосте Proxmox"
    min: 1
    max: 64
    step: 1
    initial: 12

  # Количество процессоров, выделенных для каждой VM или LXC
  cpu_100:
    name: "CPU 100 (HAOS)"
    min: 1
    max: 12
    step: 1
    initial: 2

  cpu_200:
    name: "CPU 200 (CHR)"
    min: 1
    max: 12
    step: 1
    initial: 2

  cpu_101:
    name: "CPU 101 (MariaDB)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_102:
    name: "CPU 102 (Jackett)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_103:
    name: "CPU 103 (Jellyfin)"
    min: 1
    max: 12
    step: 1
    initial: 2

  cpu_104:
    name: "CPU 104 (Deluge)"
    min: 1
    max: 12
    step: 1
    initial: 2

  cpu_105:
    name: "CPU 105 (TorrServer)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_106:
    name: "CPU 106 (immich)"
    min: 1
    max: 12
    step: 1
    initial: 4

  cpu_107:
    name: "CPU 107 (Minim)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_108:
    name: "CPU 108 (Photoview)"
    min: 1
    max: 12
    step: 2
    initial: 1

  cpu_109:
    name: "CPU 109 (NPMplus)"
    min: 1
    max: 12
    step: 2
    initial: 1

  cpu_110:
    name: "CPU 110 (VaultWarden)"
    min: 1
    max: 12
    step: 2
    initial: 1

  cpu_111:
    name: "CPU 111 (PiHole)"
    min: 1
    max: 12
    step: 2
    initial: 1

  cpu_112:
    name: "CPU 112 (BookStack)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_113:
    name: "CPU 113 (UptimeKuma)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_114:
    name: "CPU 114 (AdGuard)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_115:
    name: "CPU 115 (MQTT)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_116:
    name: "CPU 116 (Zigbee2MQTT)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_118:
    name: "CPU 118 (PostgreSQL)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_119:
    name: "CPU 119 (Gas Meters API)"
    min: 1
    max: 12
    step: 1
    initial: 1

  cpu_120:
    name: "CPU 120 (Gas Meters Web Admin)"
    min: 1
    max: 12
    step: 1
    initial: 1

##############################################################################
#                                 СЕНСОРЫ
##############################################################################

template:
