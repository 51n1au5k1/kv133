################################################################################
# /packages/room_workroom.yaml
################################################################################
#
# Назначение:
#   Данный пакет Home Assistant управляет подсветкой рабочей зоны (working_room_led)
#   в кабинете и контролирует температуру в помещении. Уведомления отправляются
#   при критическом снижении температуры, если дверь/окно открыты.
#
# Структура:
#   automation:
#     1) "Кабинет: Вкл/выкл подсветки рабочей зоны кнопкой" —
#        срабатывает на одиночное нажатие кнопки (single) и переключает (toggle)
#        состояние подсветки рабочего стола.
#     2) Уведомления при низкой температуре —
#        отправка уведомлений в Telegram и голосом через Яндекс.Станцию.
#     3) Сброс антиспам-флага уведомлений о температуре.
#
################################################################################

sensor:
  # Сенсор для усреднённого значения температуры в мастерской
  # Приводим имя к ожидаемому entity_id: sensor.srednee_znachenie_temperatury_v_masterskoi_2
  - platform: filter
    name: "srednee_znachenie_temperatury_v_masterskoi_2"
    entity_id: sensor.cgllc_cn_blt_3_15gd8656slo00_dove_temperature_p_2_1
    unique_id: workroom_filtered_th
    filters:
      - filter: time_simple_moving_average
        window_size: "00:02" # Окно усреднения — 2 минуты
        precision: 2 # Округление до двух знаков

input_boolean:
  # Сенсор-флаг уведомлений о падении температуры
  workroom_th_notice:
    name: "Мастерская: Сенсор уведомлений о температуре"
    initial: false
    icon: mdi:bell-ring

# ДОБАВЛЕНО: Таймер для надежного сброса флага
timer:
  workroom_th_notice_reset:
    name: "Мастерская: таймер сброса уведомлений"
    duration: "00:20:00"
    icon: mdi:timer-refresh

automation:
  # ----------------------------------------------------------------------------
  # 1) ВКЛ/ВЫКЛ ПОДСВЕТКИ РАБОЧЕЙ ЗОНЫ КНОПКОЙ
  # ----------------------------------------------------------------------------
  - id: "29873ab9-335c-4c39-9898-b01b5a482606"
    alias: "Кабинет: Вкл/выкл подсветки рабочей зоны кнопкой"
    description: >
      Одиночное нажатие физической кнопки переключает (toggle) подсветку рабочего стола.
    mode: restart
    triggers:
      - trigger: device
        domain: mqtt
        device_id: 8067572bca7252311fc2ce6152f90f34
        type: action
        subtype: single
        discovery_id: "0x00158d0003cffd82 action_single"
    conditions: []
    actions:
      - action: light.toggle
        target:
          entity_id: light.working_room_led

  # ----------------------------------------------------------------------------
  # 2) Уведомление: Температура в мастерской ниже 20° (усреднённое значение)
  # ----------------------------------------------------------------------------
  - id: "abe6206a-a428-4b31-928f-789c38355279"
    alias: "Уведомление о низкой температуре в мастерской (усреднённое значение)"
    description: >
      Если с усреднённого датчика температура в мастерской <20°C при открытой двери,
      напомнить закрыть дверь (голосом или Телеграм) и выставить флаг,
      чтобы не спамить до сброса.
    mode: single
    triggers:
      # Основной триггер (переход границы)
      - trigger: numeric_state
        entity_id: sensor.srednee_znachenie_temperatury_v_masterskoi_2
        below: 20
        for:
          minutes: 1
      # Резервный триггер (если HA перезагрузился, а там уже холодно)
      - trigger: time_pattern
        minutes: "/15"

    conditions:
      # Проверка значения (нужна для time_pattern и как условие для numeric_state)
      - condition: numeric_state
        entity_id: sensor.srednee_znachenie_temperatury_v_masterskoi_2
        below: 20

      - condition: state
        entity_id: binary_sensor.masterskaia_balkon_contact
        state: "on"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
      - condition: state
        entity_id: input_boolean.workroom_th_notice
        state: "off"
      - condition: template
        value_template: >-
          {{ states('sensor.srednee_znachenie_temperatury_v_masterskoi_2') not in ['unknown','unavailable',''] }}

    actions:
      - variables:
          telegram_message: "Температура в мастерской ниже 20°. Закройте дверь!"

      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.silent_mode
                state: "off"
              - condition: state
                entity_id: person.master
                state: "home"
            sequence:
              - action: script.yandex_tts_generic
                data:
                  text: "Внимание! Температура в мастерской ниже двадцати градусов."
          - conditions:
              - condition: state
                entity_id: input_boolean.silent_mode
                state: "on"
              - condition: state
                entity_id: person.master
                state: "home"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_master
                data:
                  message: "{{ telegram_message }}"

      # Ставим флаг и запускаем ТАЙМЕР (вместо delay)
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.workroom_th_notice
      - action: timer.start
        target:
          entity_id: timer.workroom_th_notice_reset
        data:
          duration: "00:{{ states('input_number.low_th_notification_reset_period') | int(20) }}:00"

  # ----------------------------------------------------------------------------
  # 3) HELPER: Сброс уведомлений о температуре в мастерской
  # (Переписано на timer.finished)
  # ----------------------------------------------------------------------------
  - id: "9bdeb719-0792-4176-8451-367273fdbb4c"
    alias: "HELPER: Сброс уведомлений о температуре в мастерской"
    mode: single
    triggers:
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.workroom_th_notice_reset
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.workroom_th_notice
