################################################################################
# /packages/plant_ficus_lyrata.yaml
################################################################################

# ==============================================================================
# НАСТРОЙКИ (ВКЛ/ВЫКЛ УВЕДОМЛЕНИЙ)
# ==============================================================================
input_boolean:
  ficus_notify_soil:
    name: "Фикус: Уведомлять о поливе"
    icon: mdi:water
    # initial: on

  ficus_notify_temp:
    name: "Фикус: Уведомлять о температуре"
    icon: mdi:thermometer
    # initial: on

# ==============================================================================
# ХРАНЕНИЕ СОСТОЯНИЯ (История уведомлений)
# ==============================================================================
input_text:
  notification_history_ficus_lyrata:
    name: "Фикус лировидный: История"
    max: 255

input_datetime:
  last_ficus_lyrata_soil_notification:
    name: "Last Ficus Soil Notif"
    has_date: true
    has_time: true
  last_ficus_lyrata_temperature_notification:
    name: "Last Ficus Temp Notif"
    has_date: true
    has_time: true

# ==============================================================================
# СГЛАЖИВАЮЩИЕ ФИЛЬТРЫ
# ==============================================================================
sensor:
  - platform: filter
    name: "ficus_lyrata_filtered_temperature"
    entity_id: sensor.flower_ficus_efekta_sensor_temperature
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00"
        precision: 2

  - platform: filter
    name: "ficus_lyrata_filtered_soil_moisture"
    entity_id: sensor.flower_ficus_efekta_sensor_soil_moisture
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00"
        precision: 2

# ==============================================================================
# БИНАРНЫЕ СЕНСОРЫ (ЛОГИКА УВЕДОМЛЕНИЙ)
# ==============================================================================
template:
  - binary_sensor:
      # --- ПОЧВА (НУЖЕН ПОЛИВ) ---
      - unique_id: plant_alert_ficus_lyrata_soil
        name: "Необходимость полива (Фикус)"
        device_class: problem
        availability: >-
          {{ states('sensor.ficus_lyrata_filtered_soil_moisture') not in ['unknown','unavailable',''] }}
        state: >-
          {% if is_state('input_boolean.ficus_notify_soil', 'off') %}
            false
          {% else %}
            {% set moisture = states('sensor.ficus_lyrata_filtered_soil_moisture') | float(0) %}
            {% set min_thr  = states('number.ficus_lyrata_min_soil_moisture') | float(15) %}
            {% set max_thr  = states('number.ficus_lyrata_max_soil_moisture') | float(60) %}
            
            {% set was_on   = is_state('binary_sensor.plant_alert_ficus_lyrata_soil','on') %}
            {% set release_thr = min_thr + 5 %}
            
            {% if moisture > max_thr %} false
            {% elif was_on %} {{ moisture < release_thr }}
            {% else %} {{ moisture < min_thr }}
            {% endif %}
          {% endif %}
        icon: mdi:water-alert

      # --- ТЕМПЕРАТУРА ---
      - unique_id: plant_alert_ficus_lyrata_temperature
        name: "Температура (Фикус)"
        device_class: problem
        state: >-
          {% if is_state('input_boolean.ficus_notify_temp', 'off') %}
            false
          {% else %}
            {% set t    = states('sensor.ficus_lyrata_filtered_temperature') | float(0) %}
            {% set tmin = states('number.ficus_lyrata_min_temperature') | float(12) %}
            {% set tmax = states('number.ficus_lyrata_max_temperature') | float(32) %}
            {{ (t > 0) and (t < tmin or t > tmax) }}
          {% endif %}
        icon: mdi:sun-thermometer-outline

# ==============================================================================
# АВТОМАТИЗАЦИИ
# ==============================================================================
automation:
  # 1. Полив
  - id: "ficus_notify_soil"
    alias: "Растение. Фикус: Уведомление о поливе"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.plant_alert_ficus_lyrata_soil
        to: "on"
        for: "00:30:00"
    condition:
      - condition: state
        entity_id: person.master
        state: "home"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    action:
      - service: script.plant_check_conditions
        data:
          plant_name: "Фикус лировидный"
          plant_name_latin: "ficus_lyrata"

  # 2. Температура
  - id: "ficus_notify_temp"
    alias: "Растение. Фикус: Уведомление о температуре"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.plant_alert_ficus_lyrata_temperature
        to: "on"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: person.master
        state: "home"
      - condition: state
        entity_id: input_boolean.system_startup_phase
        state: "off"
    action:
      - service: script.plant_check_conditions
        data:
          plant_name: "Фикус лировидный"
          plant_name_latin: "ficus_lyrata"

  # 3. Периодическая проверка
  - id: "ficus_periodic_check"
    alias: "Растение. Фикус: Периодическая проверка"
    trigger:
      - platform: time_pattern
        hours: "/6"
    action:
      - service: script.plant_check_conditions
        data:
          plant_name: "Фикус лировидный"
          plant_name_latin: "ficus_lyrata"
