################################################################################
# /packages/watch_winder.yaml
################################################################################
#
# АВТОМАТИЧЕСКИЙ ЗАВОДЧИК МЕХАНИЧЕСКИХ ЧАСОВ
#
# ЧАСЫ:
# • HVILINA Star Chronicle — Miyota 9100
# • Orient ET0T / Sun & Moon — Orient 46B40
#
# РЕЖИМ:
# • оба экземпляра находятся на одной вращающейся площадке
# • направление вращения — вправо (forward)
# • щадящий цикл: 7 циклов в сутки по 10 минут каждый
# • запуск в 06:00, 08:00, 11:00, 13:00, 16:00, 18:00, 21:00
# • длительность одного цикла — 600 секунд (≈98 оборотов площадки)
# • измеренная скорость площадки — около 9,8 об/мин
# • расчётная суточная нагрузка — около 686 оборотов (имитация офисного дня)
# • ночью (с 21:00 до 06:00) полный покой
#
# ЗАВИСИМОСТИ:
# • number.watch_winder_dlitelnost_vrashcheniia
# • fan.watch_winder_motor_zavodchika
# • button.watch_winder_zapustit_tsikl
#
################################################################################

##############################################################################
# АВТОМАТИЗАЦИИ
##############################################################################

automation:
  # ----------------------------------------------------------------------------
  # 1. ЩАДЯЩИЙ ЦИКЛ ЗАВОДЧИКА ЧАСОВ (GENTLE MODE)
  # ----------------------------------------------------------------------------
  - id: "78d11ce9-448e-4817-ac56-fd6474f40ca3"
    alias: "Заводчик часов — HVILINA и Orient — Gentle 600 TPD"
    description: >-
      Щадящий режим: 7 циклов по 10 минут (≈98 оборотов) каждые 2,5 часа.
      Период активности с 06:00 до 22:30. Ночью полный покой.
      Суммарно ≈ 686 оборотов в сутки — имитация офисного дня.
    mode: single
    triggers:
      - trigger: time_pattern
        hours: "6,8,11,13,16,18,21"
        minutes: "0"

    actions:
      - action: number.set_value
        target:
          entity_id: number.watch_winder_dlitelnost_vrashcheniia
        data:
          value: 600

      - action: fan.set_direction
        target:
          entity_id: fan.watch_winder_motor_zavodchika
        data:
          direction: forward

      - delay: "00:00:01"

      - action: button.press
        target:
          entity_id: button.watch_winder_zapustit_tsikl
