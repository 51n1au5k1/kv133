################################################################################
# /packages/watch_winder.yaml
################################################################################
#
# АВТОМАТИЧЕСКИЙ ЗАВОДЧИК МЕХАНИЧЕСКИХ ЧАСОВ
#
# ЧАСЫ:
# • HVILINA Star Chronicle — Miyota 9100
# • Orient ET0T / Sun & Moon — Orient 46B40
#
# РЕЖИМ:
# • оба экземпляра находятся на одной вращающейся площадке
# • направление вращения — вправо (forward)
# • 18 циклов в сутки: ежечасно с 06:00 до 23:00 включительно
# • длительность одного цикла — 272 секунды
# • измеренная скорость площадки — около 9,8 об/мин
# • расчётная нагрузка — около 800 оборотов площадки в сутки
#
# ЗАВИСИМОСТИ:
# • number.watch_winder_dlitelnost_vrashcheniia
# • fan.watch_winder_motor_zavodchika
# • button.watch_winder_zapustit_tsikl
#
################################################################################

##############################################################################
# АВТОМАТИЗАЦИИ
##############################################################################

automation:
  # ----------------------------------------------------------------------------
  # 1. ПОЧАСОВОЙ ЦИКЛ ЗАВОДЧИКА ЧАСОВ
  # ----------------------------------------------------------------------------
  - id: "78d11ce9-448e-4817-ac56-fd6474f40ca3"
    alias: "Заводчик часов — HVILINA и Orient — 800 TPD"
    description: >-
      18 циклов в сутки с 06:00 до 23:00.
      Каждый цикл длится 272 секунды, направление — вправо.
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "0"

    conditions:
      - condition: template
        value_template: "{{ 6 <= now().hour <= 23 }}"

    actions:
      # Перед каждым запуском восстанавливаем расчётную длительность цикла.
      - action: number.set_value
        target:
          entity_id: number.watch_winder_dlitelnost_vrashcheniia
        data:
          value: 272

      # Для общей площадки используем направление, необходимое Miyota 9100.
      - action: fan.set_direction
        target:
          entity_id: fan.watch_winder_motor_zavodchika
        data:
          direction: forward

      # Даём ESPHome время применить новое направление.
      - delay: "00:00:01"

      - action: button.press
        target:
          entity_id: button.watch_winder_zapustit_tsikl
