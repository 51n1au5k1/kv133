################################################################################
# /packages/watch_winder.yaml
################################################################################
#
# АВТОМАТИЧЕСКИЙ ЗАВОДЧИК МЕХАНИЧЕСКИХ ЧАСОВ
#
# ЧАСЫ:
# • HVILINA Star Chronicle — Miyota 9100
# • Orient ET0T / Sun & Moon — Orient 46B40
#
# РЕЖИМ:
# • оба экземпляра находятся на одной вращающейся площадке
# • направление вращения — вправо (forward)
# • 7 дневных блоков с интервалом 2 часа 30 минут
# • каждый блок: 5 минут вращения, 15 минут покоя, 5 минут вращения
# • всего 14 циклов по 300 секунд
# • измеренная скорость площадки — около 9,8 об/мин
# • один цикл — около 49 оборотов
# • расчётная суточная нагрузка — около 686 оборотов
# • ночной покой — примерно с 21:25 до 06:00
#
# ЗАВИСИМОСТИ:
# • number.watch_winder_dlitelnost_vrashcheniia
# • fan.watch_winder_motor_zavodchika
# • button.watch_winder_zapustit_tsikl
#
################################################################################

automation:
  # ----------------------------------------------------------------------------
  # 1. ЩАДЯЩИЙ ЦИКЛ ЗАВОДЧИКА ЧАСОВ
  # ----------------------------------------------------------------------------
  - id: "78d11ce9-448e-4817-ac56-fd6474f40ca3"
    alias: "Заводчик часов — HVILINA и Orient — Gentle 686 TPD"
    description: >-
      Семь дневных блоков. Каждый блок состоит из двух циклов
      по 300 секунд с 15 минутами покоя между ними.
      Направление — вправо. Расчётная нагрузка при скорости
      9,8 об/мин составляет около 686 оборотов в сутки.
    mode: single
    triggers:
      - trigger: time
        at:
          - "06:00:00"
          - "08:30:00"
          - "11:00:00"
          - "13:30:00"
          - "16:00:00"
          - "18:30:00"
          - "21:00:00"

    conditions: []

    actions:
      # Один короткий цикл длится пять минут.
      - action: number.set_value
        target:
          entity_id: number.watch_winder_dlitelnost_vrashcheniia
        data:
          value: 300

      # Для Miyota 9100 фиксируем текущее вращение вправо.
      - action: fan.set_direction
        target:
          entity_id: fan.watch_winder_motor_zavodchika
        data:
          direction: forward

      - delay: "00:00:01"

      # Первый пяти­минутный цикл.
      - action: button.press
        target:
          entity_id: button.watch_winder_zapustit_tsikl

      # Пять минут вращения и затем пятнадцать минут покоя.
      - delay: "00:20:00"

      # Второй пяти­минутный цикл.
      - action: button.press
        target:
          entity_id: button.watch_winder_zapustit_tsikl

      # Оставляем автоматизацию активной до завершения второго цикла.
      - delay: "00:05:05"
